<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mentoria Wanessa Guedes</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; overflow: hidden; background-color: #020617; color: #e2e8f0; }
        
        .glass-panel { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-panel-hover:hover { background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(139, 92, 246, 0.5); box-shadow: 0 0 20px rgba(139, 92, 246, 0.3); }
        .glass-input { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.15); color: white; transition: all 0.3s ease; }
        .glass-input:focus { outline: none; border-color: rgba(139, 92, 246, 0.7); box-shadow: 0 0 15px rgba(139, 92, 246, 0.4); background: rgba(0, 0, 0, 0.6); }
        .neon-text { text-shadow: 0 0 15px rgba(167, 139, 250, 0.6), 0 0 30px rgba(167, 139, 250, 0.4); }
        
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.4); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(167, 139, 250, 0.8); }
        
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }

        @keyframes expandDown { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 200px; } }
        .animate-expand { animation: expandDown 0.4s ease-out forwards; overflow: hidden; }

        /* Estilo Lúdico Mapas Mentais */
        .mindmap-node { position: relative; z-index: 10; transition: transform 0.3s, box-shadow 0.3s; }
        .mindmap-node:hover { transform: translateY(-3px); }
        
        @keyframes flowLine { 0% { stroke-dashoffset: 24; } 100% { stroke-dashoffset: 0; } }
        .path-flow { stroke-dasharray: 6; animation: flowLine 1s linear infinite; }
        
        .mindmap-line-v { position: absolute; width: 2px; background: linear-gradient(to bottom, var(--glow-color), transparent); left: 50%; transform: translateX(-50%); z-index: 1; }
        .mindmap-line-h { position: absolute; height: 2px; background: linear-gradient(to right, transparent, var(--glow-color), transparent); top: 32px; z-index: 1; }
    </style>
</head>
<body>

    <div id="bg-carousel" class="absolute inset-0 z-[-1] overflow-hidden bg-slate-950"></div>
    <div class="absolute inset-0 bg-slate-950/85 z-0 mix-blend-multiply pointer-events-none"></div>
    <div class="absolute top-0 left-[-10%] w-[300px] h-[300px] md:w-[500px] md:h-[500px] bg-violet-600/20 rounded-full blur-[100px] md:blur-[150px] pointer-events-none fixed z-0"></div>
    <div class="absolute bottom-0 right-[-10%] w-[300px] h-[300px] md:w-[500px] md:h-[500px] bg-cyan-600/20 rounded-full blur-[100px] md:blur-[150px] pointer-events-none fixed z-0"></div>

    <div id="app-root" class="relative z-10 h-screen w-full overflow-hidden"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, updateDoc, addDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDBuOiA3jNQqNYhASP9ncCqjP6ngzJ61TY",
            authDomain: "mentoriawg.firebaseapp.com",
            projectId: "mentoriawg",
            storageBucket: "mentoriawg.firebasestorage.app",
            messagingSenderId: "112550898338",
            appId: "1:112550898338:web:4ca6ce3e74280b56f045fb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const teacherImage = "Screenshot_20260314_101001_Instagram.jpg";
        const fallbackImage = "https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=1200&q=80";
        const bgImages = [
            "https://images.unsplash.com/photo-1434030216411-0b793f4b4173?auto=format&fit=crop&w=1920&q=80", 
            "https://images.unsplash.com/photo-1532012197267-da84d127e765?auto=format&fit=crop&w=1920&q=80", 
            "https://images.unsplash.com/photo-1517842645767-c639042777db?auto=format&fit=crop&w=1920&q=80"
        ];
        const daysMap = [
            { key: 'dom', label: 'Dom', index: 0 }, { key: 'seg', label: 'Seg', index: 1 }, 
            { key: 'ter', label: 'Ter', index: 2 }, { key: 'qua', label: 'Qua', index: 3 },
            { key: 'qui', label: 'Qui', index: 4 }, { key: 'sex', label: 'Sex', index: 5 }, { key: 'sab', label: 'Sáb', index: 6 }
        ];

        const LOADER_SVG = `<svg class="animate-spin w-5 h-5 mx-auto text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;

        window.App = {
            state: {
                user: null,
                userData: null,
                loading: true,
                authView: 'select',
                authError: '',
                platformLogo: localStorage.getItem('customPlatformLogo') || null,
                
                activeTab: 'dashboard',
                isMenuOpen: false,
                
                students: [],
                classes: [],
                selectedStudentId: null,
                
                schedule: { seg: 4, ter: 4, qua: 4, qui: 4, sex: 4, sab: 6, dom: 0 },
                regAvatarUrl: null,
                
                editingClassId: null,
                confirmDeleteClassId: null,

                lastTypedEmail: '',
                lastTypedPw: '',

                activeTaskInputId: null, 
                
                // MENTORA: Controle do Editor de Cronograma
                editalForms: [{ id: Date.now(), name: '', content: '' }],
                parsedBlocks: null,
                
                // CONTROLE DE SEGURANÇA PARA DELETAR SEM BUG
                confirmDeleteId: null,
                
                isCardFlipped: false,
                expandedMindMapId: null,
                
                activeTimerId: null,
                activeTimerSeconds: 0,
                timerIntervalObj: null
            },
            unsubs: [],

            init: function() {
                this.initCarousel();
                
                onAuthStateChanged(auth, (user) => {
                    this.state.user = user;
                    this.clearUnsubs();
                    
                    if (user) {
                        const docRef = doc(db, 'users', user.uid);
                        const unsub = onSnapshot(docRef, (docSnap) => {
                            if (docSnap.exists()) {
                                this.state.userData = { id: docSnap.id, ...docSnap.data() };
                                
                                if(!this.state.userData.flashcards) this.state.userData.flashcards = [];
                                if(!this.state.userData.dailyCardLimit) this.state.userData.dailyCardLimit = 10;
                                
                                this.loadData();
                            } else {
                                this.state.userData = null;
                            }
                            this.state.loading = false;
                            this.render();
                        }, (err) => { 
                            console.error(err); 
                            this.state.loading = false; 
                            this.render(); 
                        });
                        this.unsubs.push(unsub);
                    } else {
                        this.state.userData = null;
                        this.state.loading = false;
                        this.render();
                    }
                });
            },

            clearUnsubs: function() {
                this.unsubs.forEach(u => u());
                this.unsubs = [];
                if(this.state.timerIntervalObj) clearInterval(this.state.timerIntervalObj);
            },

            loadData: function() {
                if (this.state.userData && this.state.userData.role === 'mentor') {
                    const qStudents = query(collection(db, 'users'), where("role", "==", "student"));
                    const u1 = onSnapshot(qStudents, (snap) => {
                        this.state.students = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        this.render();
                    });
                    this.unsubs.push(u1);
                }
                const u2 = onSnapshot(collection(db, 'classes'), (snap) => {
                    let cls = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    cls.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                    this.state.classes = cls;
                    this.render();
                });
                this.unsubs.push(u2);
            },

            initCarousel: function() {
                const container = document.getElementById('bg-carousel');
                bgImages.forEach((src, i) => {
                    const img = document.createElement('img');
                    img.src = src;
                    img.className = `absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 ease-in-out ${i === 0 ? 'opacity-100' : 'opacity-0'}`;
                    img.id = `bg-img-${i}`;
                    container.appendChild(img);
                });
                let idx = 0;
                setInterval(() => {
                    document.getElementById(`bg-img-${idx}`).classList.remove('opacity-100');
                    document.getElementById(`bg-img-${idx}`).classList.add('opacity-0');
                    idx = (idx + 1) % bgImages.length;
                    document.getElementById(`bg-img-${idx}`).classList.remove('opacity-0');
                    document.getElementById(`bg-img-${idx}`).classList.add('opacity-100');
                }, 8000);
            },

            notify: function(msg, isError = false) {
                const toast = document.createElement('div');
                toast.className = `fixed bottom-4 right-4 ${isError ? 'bg-rose-600' : 'bg-emerald-600'} border border-white/20 text-white px-4 py-3 rounded-xl shadow-2xl z-[9999] flex items-center gap-2 font-bold text-sm transition-opacity duration-500 opacity-0`;
                toast.innerHTML = `<i data-lucide="${isError ? 'alert-triangle' : 'check-circle'}" class="w-4 h-4"></i> ${msg}`;
                document.body.appendChild(toast);
                if(window.lucide) lucide.createIcons();
                setTimeout(() => { toast.style.opacity = '1'; }, 10);
                setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 3500);
            },

            formatDateBR: (ds) => {
                if(!ds) return '';
                if(ds.includes('-')) { const [y,m,d] = ds.split('-'); return `${d}/${m}/${y}`; }
                return new Date(ds).toLocaleDateString('pt-BR');
            },
            formatDateTimeBR: (ds) => {
                if(!ds) return '';
                const d = new Date(ds);
                return d.toLocaleDateString('pt-BR') + ' às ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
            },
            formatTimer: function(totalSeconds) {
                const h = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
                const m = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
                const s = (totalSeconds % 60).toString().padStart(2, '0');
                return `${h}:${m}:${s}`;
            },
            compressImg: (file) => new Promise((resolve) => {
                const r = new FileReader(); r.readAsDataURL(file);
                r.onload = (e) => {
                    const i = new Image(); i.src = e.target.result;
                    i.onload = () => {
                        const c = document.createElement('canvas');
                        let w = i.width, h = i.height;
                        if(w>h) { if(w>300){h*=300/w; w=300;} } else { if(h>300){w*=300/h; h=300;} }
                        c.width = w; c.height = h;
                        c.getContext('2d').drawImage(i,0,0,w,h);
                        resolve(c.toDataURL('image/jpeg', 0.8));
                    };
                };
            }),
            
            getSafePw: function(key) {
                try { 
                    const val = localStorage.getItem(key);
                    if(!val) return '';
                    return decodeURIComponent(atob(val)); 
                } catch(e) { 
                    try { return atob(localStorage.getItem(key)); } catch(err) { return ''; }
                }
            },
            setSafePw: function(key, pw) {
                try { localStorage.setItem(key, btoa(encodeURIComponent(pw))); } catch(e) {}
            },

            setView: function(v) { 
                this.state.authView = v; 
                this.state.authError = ''; 
                this.state.lastTypedEmail = ''; 
                this.state.lastTypedPw = ''; 
                this.render(); 
            },
            setTab: function(t) { this.state.activeTab = t; this.state.isMenuOpen = false; this.render(); },
            toggleMenu: function() { this.state.isMenuOpen = !this.state.isMenuOpen; this.render(); },
            logout: function() { 
                this.state.lastTypedEmail = ''; 
                this.state.lastTypedPw = ''; 
                signOut(auth); 
            },
            
            togglePassword: function(id) {
                const el = document.getElementById(id);
                const btn = document.getElementById(`btn-${id}`);
                if(el.type === 'password') { el.type = 'text'; btn.innerHTML = '<i data-lucide="eye-off" class="w-4 h-4 md:w-5 md:h-5"></i>'; } 
                else { el.type = 'password'; btn.innerHTML = '<i data-lucide="eye" class="w-4 h-4 md:w-5 md:h-5"></i>'; }
                lucide.createIcons();
            },

            uploadLogo: async function(input) {
                if(input.files[0]) {
                    const b64 = await this.compressImg(input.files[0]);
                    this.state.platformLogo = b64;
                    localStorage.setItem('customPlatformLogo', b64);
                    this.render();
                }
            },

            startTimer: function(taskId, totalMins) {
                if (this.state.activeTimerId === taskId && this.state.timerIntervalObj) return; 
                
                if (this.state.activeTimerId !== taskId) {
                    this.state.activeTimerId = taskId;
                    this.state.activeTimerSeconds = totalMins * 60;
                }
                
                if(this.state.timerIntervalObj) clearInterval(this.state.timerIntervalObj);
                
                this.state.timerIntervalObj = setInterval(() => {
                    if (this.state.activeTimerSeconds > 0) {
                        this.state.activeTimerSeconds--;
                        const el = document.getElementById(`timer-display-${taskId}`);
                        if(el) el.innerText = this.formatTimer(this.state.activeTimerSeconds);
                    } else {
                        this.pauseTimer();
                    }
                }, 1000);
                this.render();
            },
            pauseTimer: function() {
                if(this.state.timerIntervalObj) {
                    clearInterval(this.state.timerIntervalObj);
                    this.state.timerIntervalObj = null;
                }
                this.render();
            },

            // =========================================================================
            // LOGIN E CADASTRO: CÓDIGO 100% ORIGINAL RESTAURADO E BLINDADO
            // =========================================================================
            loginStudent: async function(e) {
                e.preventDefault();
                const em = document.getElementById('log-em').value.trim();
                const pw = document.getElementById('log-pw').value;
                const rem = document.getElementById('log-rem').checked;
                
                this.state.lastTypedEmail = em;
                this.state.lastTypedPw = pw;
                
                const btn = document.getElementById('btn-log-submit');
                const origTxt = btn ? btn.innerHTML : '';
                if(btn) { btn.innerHTML = LOADER_SVG; btn.disabled = true; }
                this.state.authError = '';
                
                try {
                    const cred = await signInWithEmailAndPassword(auth, em, pw);
                    
                    // Auto-recuperação Local (Somente se não existir, cria o perfil do aluno)
                    try {
                        const docRef = doc(db, 'users', cred.user.uid);
                        const d = await getDoc(docRef);
                        if(!d.exists()) {
                            await setDoc(docRef, {
                                name: "Aluno(a)", email: em, age: 18, targetExam: "Definir", 
                                schedule: { seg: 4, ter: 4, qua: 4, qui: 4, sex: 4, sab: 6, dom: 0 },
                                role: 'student', status: 'pending', retention: 0, streak: 0, hours: 0, tasksDone: 0,
                                avatarUrl: null, mentorMessages: [], performance: {}, generatedSchedule: [], flashcards: [], dailyCardLimit: 10, rawEdital: '', createdAt: new Date().toISOString()
                            });
                        }
                    } catch(ex){}

                    if(rem) { localStorage.setItem('wg_s_em', em); this.setSafePw('wg_s_pw', pw); }
                    else { localStorage.removeItem('wg_s_em'); localStorage.removeItem('wg_s_pw'); }
                } catch(err) { 
                    console.error(err);
                    this.state.authError = 'E-mail ou senha incorretos.'; 
                    if(btn) { btn.innerHTML = origTxt; btn.disabled = false; }
                    this.render(); 
                }
            },

            registerStudent: async function(e) {
                e.preventDefault();
                const em = document.getElementById('reg-em').value.trim();
                const pw = document.getElementById('reg-pw').value;
                const nm = document.getElementById('reg-nm').value;
                const ex = document.getElementById('reg-ex').value;
                const ag = document.getElementById('reg-ag').value;

                const btn = document.getElementById('btn-reg-submit');
                const origTxt = btn ? btn.innerHTML : '';
                if(btn) { btn.innerHTML = LOADER_SVG; btn.disabled = true; }
                this.state.authError = '';

                try {
                    const cred = await createUserWithEmailAndPassword(auth, em, pw);
                    await setDoc(doc(db, 'users', cred.user.uid), {
                        name: nm, email: em, age: Number(ag), targetExam: ex, schedule: this.state.schedule,
                        role: 'student', status: 'pending', retention: 0, streak: 0, hours: 0, tasksDone: 0,
                        avatarUrl: this.state.regAvatarUrl, mentorMessages: [], performance: {}, generatedSchedule: [], flashcards: [], dailyCardLimit: 10, rawEdital: '', createdAt: new Date().toISOString()
                    });
                } catch(err) {
                    console.error(err);
                    if(err.code==='auth/email-already-in-use') this.state.authError='Este e-mail já está cadastrado. Tente entrar.';
                    else if(err.code==='auth/weak-password') this.state.authError='A senha deve ter no mínimo 6 caracteres.';
                    else this.state.authError = 'Erro ao criar conta: ' + err.message;
                    if(btn) { btn.innerHTML = origTxt; btn.disabled = false; }
                    this.render();
                }
            },

            loginMentor: async function(e) {
                e.preventDefault();
                const em = document.getElementById('men-em').value.trim();
                const pw = document.getElementById('men-pw').value;
                const rem = document.getElementById('men-rem').checked;
                
                this.state.lastTypedEmail = em;
                this.state.lastTypedPw = pw;

                const btn = document.getElementById('btn-men-submit');
                const origTxt = btn ? btn.innerHTML : '';
                if(btn) { btn.innerHTML = LOADER_SVG; btn.disabled = true; }
                this.state.authError = '';

                try {
                    await signInWithEmailAndPassword(auth, em, pw);
                    
                    // Auto-Recuperação Local Mentora
                    try {
                        const docRef = doc(db, 'users', auth.currentUser.uid);
                        const d = await getDoc(docRef);
                        if(!d.exists()) {
                            await setDoc(docRef, { name: 'Wanessa Guedes', email: em, role: 'mentor', avatarUrl: null });
                        }
                    } catch(ex){}

                    if(rem) { localStorage.setItem('wg_m_em', em); this.setSafePw('wg_m_pw', pw); }
                    else { localStorage.removeItem('wg_m_em'); localStorage.removeItem('wg_m_pw'); }
                } catch(err) {
                    if (err.code === 'auth/invalid-credential' || err.code === 'auth/user-not-found' || err.code === 'auth/invalid-login-credentials') {
                        try {
                            const cred = await createUserWithEmailAndPassword(auth, em, pw);
                            await setDoc(doc(db, 'users', cred.user.uid), { name: 'Wanessa Guedes', email: em, role: 'mentor', avatarUrl: null });
                            if(rem) { localStorage.setItem('wg_m_em', em); this.setSafePw('wg_m_pw', pw); }
                            else { localStorage.removeItem('wg_m_em'); localStorage.removeItem('wg_m_pw'); }
                        } catch(cErr) {
                            if(cErr.code==='auth/email-already-in-use') this.state.authError='Senha incorreta.';
                            else this.state.authError = "Erro no banco. Verifique as Regras do Firestore.";
                            if(btn) { btn.innerHTML = origTxt; btn.disabled = false; }
                            this.render();
                        }
                    } else { 
                        console.error(err);
                        this.state.authError = 'Senha incorreta ou erro de rede.'; 
                        if(btn) { btn.innerHTML = origTxt; btn.disabled = false; }
                        this.render();
                    }
                }
            },
            // =========================================================================

            updateSchedVal: function(day, delta) {
                let cur = this.state.schedule[day] || 0;
                this.state.schedule[day] = Math.max(0, Math.min(24, cur + delta));
                const el = document.getElementById(`sch-${day}`);
                if(el) el.innerText = `${this.state.schedule[day]}h`;
            },

            uploadAvatar: async function(input, type) {
                if(input.files[0]) {
                    const b64 = await this.compressImg(input.files[0]);
                    if(type === 'reg') { 
                        this.state.regAvatarUrl = b64; 
                        const imgDisplay = document.getElementById('reg-av-display');
                        if (imgDisplay) imgDisplay.innerHTML = `<img src="${b64}" class="w-full h-full object-cover"/>`;
                    }
                    if(type === 'mentor' || type === 'student') {
                        await updateDoc(doc(db, 'users', this.state.userData.id), { avatarUrl: b64 });
                        if(type === 'mentor') localStorage.setItem('wg_mentor_avatar', b64);
                    }
                }
            },

            approveStudent: async function(id) { await updateDoc(doc(db, 'users', id), { status: 'active' }); },
            
            selectStudent: function(id) { 
                this.state.selectedStudentId = id; 
                this.state.parsedBlocks = null;
                this.state.editalForms = [{ id: Date.now(), name: '', content: '' }];
                this.state.confirmDeleteId = null;
                this.render(); 
            },
            
            saveClass: async function(e) {
                e.preventDefault();
                const btn = document.getElementById('btn-save-class');
                const oTxt = btn.innerHTML;
                btn.innerHTML = LOADER_SVG; btn.disabled = true; 
                
                const title = document.getElementById('cls-title').value;
                const subject = document.getElementById('cls-subj').value;
                const date = document.getElementById('cls-date').value;
                
                try {
                    if(this.state.editingClassId) {
                        await updateDoc(doc(db, 'classes', this.state.editingClassId), { title, subject, date });
                        this.state.editingClassId = null;
                    } else {
                        await addDoc(collection(db, 'classes'), { title, subject, date, createdAt: new Date().toISOString() });
                    }
                    this.render(); 
                } catch(err) { 
                    this.notify('Erro ao salvar aula. Verifique permissões.', true);
                    btn.innerHTML = oTxt; btn.disabled = false; lucide.createIcons();
                }
            },
            editClass: function(id) {
                const cls = this.state.classes.find(c=>c.id===id);
                this.state.editingClassId = id;
                this.state.confirmDeleteClassId = null;
                this.render();
                setTimeout(() => {
                    document.getElementById('cls-title').value = cls.title;
                    document.getElementById('cls-subj').value = cls.subject;
                    document.getElementById('cls-date').value = cls.date;
                    document.getElementById('cls-form').scrollIntoView({behavior: 'smooth'});
                }, 50);
            },

            updateEditalForm: function(id, field, value) {

            processEditalForms: function() {
                let blocks = [];
                
                this.state.editalForms.forEach(form => {
                    if (!form.name.trim() || !form.content.trim()) return;

                    let disciplineName = form.name.trim().toUpperCase();
                    let lines = form.content.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                    
                    let currentRoot = null;
                    let currentContent = [];

                    const pushBlock = () => {
                        if (currentContent.length > 0) {
                            blocks.push({
                                id: 'b_' + Date.now() + Math.random().toString(36).substr(2, 9),
                                discipline: disciplineName,
                                content: currentContent.join(' ') // Agrupa TUDO em um bloco de texto sem quebras de linha
                            });
                            currentContent = [];
                        }
                    };

                    lines.forEach(line => {
                        // Captura apenas a raiz principal, ignorando os subníveis
                        // Ex: "4.2.10 Processo..." vai extrair apenas o "4".
                        let match = line.match(/^ *(\d+)/);
                        if (match) {
                            let rootNum = match[1];
                            if (currentRoot === null) {
                                currentRoot = rootNum;
                            } else if (currentRoot !== rootNum) {
                                pushBlock(); // Se mudou da raiz "4" para a raiz "5", salva o bloco anterior.
                                currentRoot = rootNum;
                            }
                            currentContent.push(line);
                        } else {
                            currentContent.push(line); // Se não começar com número, é continuação do bloco atual.
                        }
                    });
                    pushBlock(); // Salva o último
                });

                if (blocks.length === 0) return this.notify("Preencha pelo menos uma disciplina e tópicos válidos.", true);

                this.state.parsedBlocks = blocks;
                this.render();
            },

            // =========================================================================
            finalizeSchedule: async function(studentId) {
                const stu = this.state.students.find(s=>s.id===studentId);
                const blocks = this.state.parsedBlocks;

                if(!blocks || blocks.length === 0) return this.notify('Não há blocos para gerar.', true);

                this.notify('Processando e gerando cronograma de longo prazo...', false);

                let flatTopics = blocks.map(b => {
                    return { subject: b.discipline, content: b.content };
                });

                const result = this._generateLogic(flatTopics, stu.schedule, new Date());

                try {
                    await updateDoc(doc(db, 'users', studentId), {
                        generatedSchedule: result.draft,
                        flashcards: [...(stu.flashcards || []), ...result.fcards],
                        rawEdital: "Cronograma Estruturado e Inteligente Gerado."
                    });
                    this.state.parsedBlocks = null;
                    this.state.editalForms = [{ id: Date.now(), name: '', content: '' }];
                    this.notify("Cronograma Perfeito criado com sucesso!");
                    this.render();
                } catch(e) {
                    console.error(e);
                    this.notify("Erro ao salvar o cronograma.", true);
                }
            },

            _generateLogic: function(flatTopics, scheduleConfig, baseDate) {
                let draft = [];
                let fcards = [];
                let pendingTasks = [];

                flatTopics.forEach((item, idx) => {
                    pendingTasks.push({ 
                        id: 'base_' + idx, 
                        subject: item.subject, 
                        content: item.content, 
                        type: 'teoria', 
                        minDate: new Date(baseDate),
                        step: 0 
                    });
                });

                let currDate = new Date(baseDate);
                currDate.setHours(0,0,0,0);
                const daysKeys = ['dom','seg','ter','qua','qui','sex','sab'];
                let globalId = 0;
                let sanityCheck = 0;

                const advanceToValidDay = (d) => {
                    let dCopy = new Date(d);
                    let count = 0;
                    while((scheduleConfig[daysKeys[dCopy.getDay()]] || 0) === 0 && count < 14) {
                        dCopy.setDate(dCopy.getDate() + 1); count++;
                    }
                    return dCopy;
                };

                currDate = advanceToValidDay(currDate);

                while(pendingTasks.length > 0 && sanityCheck < 5000) {
                    sanityCheck++;
                    let dayKey = daysKeys[currDate.getDay()];
                    let totalHoursAvailable = Math.floor(scheduleConfig[dayKey] || 0); 
                    
                    if (totalHoursAvailable > 0) {
                        let subjectsStudiedToday = new Set();
                        let slotsUsed = 0;

                        let dueTasks = pendingTasks.filter(t => t.minDate <= currDate);

                        // Garante EXATAMENTE X Blocos para X Horas de estudo no dia
                        while (slotsUsed < totalHoursAvailable && dueTasks.length > 0) {
                            
                            dueTasks.sort((a, b) => {
                                if (a.step !== b.step) return b.step - a.step; 
                                let aSubj = subjectsStudiedToday.has(a.subject) ? 1 : 0;
                                let bSubj = subjectsStudiedToday.has(b.subject) ? 1 : 0;
                                return aSubj - bSubj; 
                            });

                            let selectedTask = dueTasks.shift();
                            let actualIdx = pendingTasks.indexOf(selectedTask);
                            if(actualIdx > -1) pendingTasks.splice(actualIdx, 1);

                            const tId = Date.now() + '_' + globalId++;
                            const offset = currDate.getTimezoneOffset() * 60000;
                            const dateStr = (new Date(currDate.getTime() - offset)).toISOString().split('T')[0];
                            
                            // FORMATAÇÃO ESTRITA: Regra de Exclusividade do Bloco
                            let typeLabel = '';
                            if (selectedTask.type === 'teoria') typeLabel = '(1h de teoria)';
                            else if (selectedTask.type === 'revisao') typeLabel = '(1h de revisão)';
                            else if (selectedTask.type === 'questoes') typeLabel = '(1h de questões)';

                            // Output exato: [NOME DA DISCIPLINA]: [Número do Tópico] ... ([1h de atividade])
                            let formattedTopic = `${selectedTask.subject}: ${selectedTask.content} ${typeLabel}`;

                            let taskObj = {
                                id: 'tsk_' + tId, 
                                topic: formattedTopic, 
                                subject: selectedTask.subject,
                                type: selectedTask.type, 
                                duration: 60, // 1 HORA INQUEBRÁVEL
                                date: dateStr, 
                                completed: false
                            };

                            if (selectedTask.type === 'questoes') {
                                taskObj.qTotal = 0; taskObj.qCorrect = 0;
                            }

                            draft.push(taskObj);
                            subjectsStudiedToday.add(selectedTask.subject);
                            slotsUsed++;

                            // SPACED REPETITION OBRIGATÓRIA (D+1, D+7, D+15, D+30)
                            if (selectedTask.type === 'teoria') {
                                let d1 = new Date(currDate); d1.setDate(d1.getDate() + 1);
                                pendingTasks.push({ subject: selectedTask.subject, content: selectedTask.content, type: 'revisao', minDate: d1, step: 1 });

                                fcards.push({
                                    id: 'fc_'+tId, 
                                    front: `[${selectedTask.subject}] Qual a ideia central da Teoria abordada em:\n${selectedTask.content.substring(0, 45)}...?`, 
                                    back: `Tente explicar os conceitos básicos e características da disciplina de ${selectedTask.subject}.`,
                                    nextReviewDate: dateStr, interval: 1, easeFactor: 2.5
                                });
                            } 
                            else if (selectedTask.type === 'revisao' && selectedTask.step === 1) {
                                let d7 = new Date(currDate); d7.setDate(d7.getDate() + 6);
                                pendingTasks.push({ subject: selectedTask.subject, content: selectedTask.content, type: 'questoes', minDate: d7, step: 2 });
                            }
                            else if (selectedTask.type === 'questoes' && selectedTask.step === 2) {
                                let d15 = new Date(currDate); d15.setDate(d15.getDate() + 8);
                                pendingTasks.push({ subject: selectedTask.subject, content: selectedTask.content, type: 'revisao', minDate: d15, step: 3 });
                            }
                            else if (selectedTask.type === 'revisao' && selectedTask.step === 3) {
                                let d30 = new Date(currDate); d30.setDate(d30.getDate() + 15);
                                pendingTasks.push({ subject: selectedTask.subject, content: selectedTask.content, type: 'questoes', minDate: d30, step: 4 });
                            }
                        }
                    }
                    currDate.setDate(currDate.getDate() + 1);
                    currDate = advanceToValidDay(currDate);
                }

                return { draft, fcards };
            },

            readjustSchedule: async function(e) {
                if(e) e.preventDefault();
                const u = this.state.userData;
                let sched = [...(u.generatedSchedule || [])];
                let completed = sched.filter(t => t.completed);
                let incomplete = sched.filter(t => !t.completed);
                
                incomplete.sort((a,b) => new Date(a.date) - new Date(b.date));
                
                let currDate = new Date();
                currDate.setHours(0,0,0,0);
                const keys = ['dom','seg','ter','qua','qui','sex','sab'];
                
                let scheduleConfig = u.schedule || { seg: 4, ter: 4, qua: 4, qui: 4, sex: 4, sab: 6, dom: 0 };
                let totalSlots = 0;
                Object.values(scheduleConfig).forEach(v => totalSlots += Number(v));
                if(totalSlots === 0) return this.notify("Vá em Perfil e configure suas horas disponíveis.", true);
                
                const advanceToValidDay = (d) => {
                    let dCopy = new Date(d);
                    let count = 0;
                    while((scheduleConfig[keys[dCopy.getDay()]] || 0) === 0 && count < 14) {
                        dCopy.setDate(dCopy.getDate() + 1); count++;
                    }
                    return dCopy;
                };

                currDate = advanceToValidDay(currDate);
                
                let incIdx = 0;
                let safety = 0;
                while(incIdx < incomplete.length && safety < 1000) {
                    safety++;
                    let dayKey = keys[currDate.getDay()];
                    let slots = Math.floor(scheduleConfig[dayKey] || 0);
                    
                    for(let i=0; i<slots && incIdx < incomplete.length; i++) {
                        const offset = currDate.getTimezoneOffset() * 60000;
                        incomplete[incIdx].date = (new Date(currDate.getTime() - offset)).toISOString().split('T')[0];
                        incIdx++;
                    }
                    currDate.setDate(currDate.getDate() + 1);
                    currDate = advanceToValidDay(currDate);
                }
                
                try {
                    await updateDoc(doc(db, 'users', u.id), { generatedSchedule: [...completed, ...incomplete] });
                    this.notify("Cronograma reajustado com sucesso!");
                } catch(e) { this.notify("Erro ao reajustar cronograma.", true); }
                this.render();
            },

                const newSched = [...u.generatedSchedule];

                if(task.type === 'questoes' && !task.completed) {

                task.completed = !task.completed;
                if(task.completed && this.state.activeTimerId === taskId) {
                    this.pauseTimer();
                    this.state.activeTimerId = null;

                if(!task.completed && task.type === 'questoes') {
                    task.qTotal = 0; task.qCorrect = 0;
                }

            saveQuestionsTask: async function(taskId) {
                const tot = parseInt(document.getElementById(`q-tot-${taskId}`).value) || 0;
                const cor = parseInt(document.getElementById(`q-cor-${taskId}`).value) || 0;
                
                if (tot <= 0) return this.notify("Insira o total de questões resolvidas.", true);
                if (cor > tot) return this.notify("Os acertos não podem ser maiores que o total.", true);

                const u = this.state.userData;
                const newSched = [...u.generatedSchedule];
                const task = newSched.find(t => t.id === taskId);
                
                task.completed = true;
                task.qTotal = tot;
                task.qCorrect = cor;

                if(this.state.activeTimerId === taskId) {
                    this.pauseTimer();
                    this.state.activeTimerId = null;
                }

                const perf = u.performance || {};
                const subj = task.subject || 'Gerais';
                if(!perf[subj]) perf[subj] = { total: 0, correct: 0 };
                perf[subj].total += tot;
                perf[subj].correct += cor;

                this.state.activeTaskInputId = null;
                try {
                    await updateDoc(doc(db, 'users', u.id), { generatedSchedule: newSched, performance: perf });
                } catch(e) { this.notify("Erro ao salvar pontuação.", true); }

                if(!card) return;

                if(quality === 0) {
                    card.interval = 1;
                    card.easeFactor = Math.max(1.3, card.easeFactor - 0.2);
                } else if (quality === 1) {
                    card.interval = Math.max(1, Math.round(card.interval * 1.2));

                    card.interval = Math.max(1, Math.round(card.interval * card.easeFactor));
                    card.easeFactor += 0.15;

                nextDate.setDate(nextDate.getDate() + card.interval);

                }

                return `
                <div class="flex h-full w-full bg-transparent">
                    ${sidebar}
                    <main class="flex-1 flex flex-col h-[100dvh] relative">
                        <header class="glass-panel border-b border-white/5 p-3 flex items-center justify-between z-40 md:hidden">
                            <div class="flex items-center gap-3"><button onclick="window.App.toggleMenu()" class="text-slate-200"><i data-lucide="menu" class="w-5 h-5"></i></button><h2 class="text-base font-bold text-white">${navItems.find(i=>i.id===tab)?.label||'Painel'}</h2></div>
                            <button onclick="window.App.logout()" class="text-rose-400 bg-rose-500/10 p-1.5 rounded-md border border-rose-500/20"><i data-lucide="log-out" class="w-5 h-5"></i></button>
                        </header>
                        <div class="flex-1 overflow-y-auto p-4 md:p-8 z-10 custom-scrollbar"><div class="max-w-6xl mx-auto h-full">${content}</div></div>
                    </main>
                </div>`;
            },

            getStudentHtml: function() {
                const u = this.state.userData;
                const tab = this.state.activeTab;
                const uAvatar = u.avatarUrl || '🧑‍🎓';

                const navItems = [
                    { id: 'dashboard', label: 'Meu Painel', icon: 'layout-dashboard' },
                    { id: 'schedule', label: 'Cronograma', icon: 'calendar' },
                    { id: 'flashcards', label: 'Revisão Espaçada', icon: 'layers' },
                    { id: 'profile', label: 'Meu Perfil', icon: 'user' }

                const sidebar = `
                <aside class="fixed inset-y-0 left-0 z-50 w-64 md:w-72 glass-panel border-r border-white/10 shadow-2xl transform transition-transform duration-300 md:relative md:translate-x-0 flex flex-col ${this.state.isMenuOpen ? 'translate-x-0' : '-translate-x-full'}">
                    <div class="p-6 md:p-8 border-b border-white/5 text-center bg-slate-900/40 relative">
                        <button class="md:hidden absolute top-4 right-4 text-slate-300 hover:text-white" onclick="window.App.toggleMenu()"><i data-lucide="x" class="w-5 h-5"></i></button>
                        <div class="w-20 h-20 md:w-24 md:h-24 mx-auto rounded-full overflow-hidden border-2 md:border-4 border-violet-500 shadow-[0_0_30px_rgba(139,92,246,0.5)] mb-3 md:mb-4 mt-6 md:mt-4 relative group cursor-pointer" onclick="document.getElementById('stu-avatar-upload').click()">
                            <input type="file" id="stu-avatar-upload" onchange="window.App.uploadAvatar(this, 'student')" accept="image/*" class="hidden" />
                            ${u.avatarUrl ? `<img src="${u.avatarUrl}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />` : `<div class="w-full h-full bg-slate-800 flex items-center justify-center text-4xl">${uAvatar}</div>`}
                            <div class="absolute inset-0 bg-black/50 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100"><i data-lucide="upload-cloud" class="text-white mb-1 w-5 h-5"></i><span class="text-[9px] text-white font-bold uppercase">Foto</span></div>
                        </div>
                        <h2 class="font-extrabold text-white text-lg md:text-xl">${u.name.split(' ')[0]}</h2>
                        <p class="text-violet-300 text-[9px] md:text-[10px] font-black uppercase tracking-widest mt-1 bg-violet-900/40 py-1 rounded-full border border-violet-500/30 inline-block px-3">Portal do Aluno</p>

                    <nav class="p-3 md:p-4 space-y-2 md:space-y-3 flex-1">

                            <button onclick="window.App.setTab('${item.id}')" class="w-full flex items-center gap-3 px-4 py-3 md:px-5 md:py-4 rounded-xl md:rounded-2xl font-bold relative text-sm md:text-base ${tab===item.id?'bg-violet-500/30 text-white border border-violet-400/50 shadow-[inset_0_0_20px_rgba(139,92,246,0.2)]':'text-slate-300 hover:bg-white/10'}">

                    </nav>
                    <div class="p-4 border-t border-white/5 bg-slate-900/40 hidden md:block"><button onclick="window.App.logout()" class="w-full flex items-center justify-center gap-2 px-4 py-3 text-sm font-bold text-rose-300 hover:text-white hover:bg-rose-500/20 rounded-xl transition-colors"><i data-lucide="log-out" class="w-4 h-4"></i> Sair da Conta</button></div>
                </aside>`;

                let content = '';

                if (tab === 'dashboard') {
                    const today = new Date();
                    const offset = today.getTimezoneOffset() * 60000;
                    const todayStr = (new Date(today.getTime() - offset)).toISOString().split('T')[0];

                    const scheduleToday = (u.generatedSchedule || []).filter(t => t.date === todayStr);
                    const scheduleHtml = scheduleToday.length > 0 ? scheduleToday.map(t => this._renderTaskRow(t)).join('') : '<p class="text-slate-400 text-sm">Nenhuma tarefa programada para hoje. Aproveite o descanso!</p>';

                    let totalHours = 0; let totalTasks = 0; let globalAcertos = 0; let globalTotal = 0;
                    if(u.generatedSchedule) {
                        u.generatedSchedule.forEach(t => {
                            if(t.completed) { totalHours += (t.duration/60); totalTasks++; }
                        });
                    }
                    if(u.performance) {
                        Object.values(u.performance).forEach(p => { globalAcertos += p.correct; globalTotal += p.total; });
                    }
                    const globalPct = globalTotal > 0 ? Math.round((globalAcertos/globalTotal)*100) : 0;

                    // MENSAGENS DO CHAT DA MENTORA PARA O ALUNO
                    const chatMsgs = (u.mentorMessages || []).map(msg => `
                        <div class="flex ${msg.role==='student'?'justify-end':'justify-start'}">
                            <div class="flex flex-col gap-1 max-w-[90%] md:max-w-[70%]">
                                <div class="p-3 md:p-4 rounded-2xl md:rounded-3xl shadow-[0_5px_15px_rgba(0,0,0,0.3)] backdrop-blur-xl ${msg.role==='student'?'bg-gradient-to-br from-violet-600 to-fuchsia-600 text-white rounded-br-sm':'bg-slate-800/90 border border-white/10 text-slate-100 rounded-bl-sm'}">
                                    <p class="whitespace-pre-wrap font-medium text-sm md:text-base">${msg.text}</p>
                                </div>
                                <span class="text-[9px] md:text-[10px] text-slate-500 font-bold ${msg.role==='student'?'text-right mr-2':'text-left ml-2'}">${this.formatDateTimeBR(msg.date)}</span>
                            </div>
                        </div>
                    `).join('') || '<p class="text-center text-slate-500 mt-10 text-sm">Nenhuma mensagem. Mande um "Olá" para sua mentora!</p>';

                    const studentChatHtml = `
                    <div class="glass-panel rounded-[2rem] md:rounded-3xl border-white/10 bg-slate-900/80 shadow-xl mt-6 md:mt-8 flex flex-col h-[400px] md:h-[450px] overflow-hidden relative">

                            <i data-lucide="message-square" class="text-violet-400 w-5 h-5 md:w-6 md:h-6"></i>
                            <h3 class="text-lg md:text-xl font-bold text-white">Chat com a Mentora</h3>
                        </div>
                        <div class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 md:space-y-6 z-10 custom-scrollbar">
                            ${chatMsgs}
                            <div id="chat-end"></div>
                        </div>
                        <div class="p-3 md:p-5 bg-slate-950/80 border-t border-white/10 z-10">
                            <form onsubmit="window.App.sendMsg(event, 'student', '${u.id}')" class="flex gap-2 md:gap-3 relative bg-slate-900/80 rounded-2xl p-1.5 md:p-2 border border-white/20">
                                <input type="text" id="chat-inp" placeholder="Envie sua dúvida ou atualização..." class="flex-1 bg-transparent px-3 py-2 text-white outline-none font-medium text-sm md:text-base" />
                                <button type="submit" class="w-10 h-10 md:w-12 md:h-12 rounded-lg md:rounded-xl bg-violet-600 hover:bg-violet-500 flex items-center justify-center text-white transition-colors"><i data-lucide="send" class="w-4 h-4 md:w-5 md:h-5"></i></button>
                            </form>
                        </div>
                    </div>`;

                    content = `
                    <div class="space-y-6 md:space-y-8 animate-fade-in pb-10">
                        <div class="glass-panel p-6 md:p-8 rounded-2xl md:rounded-3xl border-white/10 shadow-lg bg-slate-900/60 flex flex-col md:flex-row gap-4 justify-between items-start md:items-center">
                            <div>
                                <h1 class="text-2xl md:text-4xl font-extrabold text-white mb-1 md:mb-2">Olá, ${u.name.split(' ')[0]}! 🚀</h1>
                                <p class="text-slate-300 text-sm md:text-base">Seu foco atual: <strong class="text-cyan-400">${u.targetExam}</strong></p>
                            </div>
                            <div class="flex gap-4">
                                <div class="text-center bg-black/40 p-3 rounded-xl border border-white/5"><span class="block text-2xl mb-1">🔥</span><span class="text-white font-black text-xl">${u.streak || 0}</span><p class="text-[10px] text-slate-400 font-bold uppercase">Dias</p></div>
                                <div class="text-center bg-black/40 p-3 rounded-xl border border-white/5"><span class="block text-2xl mb-1">🧠</span><span class="text-white font-black text-xl">${globalPct}%</span><p class="text-[10px] text-slate-400 font-bold uppercase">Acertos</p></div>
                            </div>
                        </div>
                        
                        <div class="glass-panel p-6 md:p-8 rounded-2xl md:rounded-3xl border-white/10 shadow-lg bg-slate-900/60">
                            <div class="flex justify-between items-center mb-6">
                                <h2 class="text-lg md:text-xl font-bold text-white flex items-center gap-2"><i data-lucide="target" class="text-violet-400 w-5 h-5"></i> Missões de Hoje</h2>
                                <button onclick="window.App.setTab('schedule')" class="text-violet-400 hover:text-white text-xs md:text-sm font-bold">Ver Tudo</button>
                            </div>
                            <div class="space-y-3">${scheduleHtml}</div>
                        </div>

                        ${studentChatHtml}
                    </div>`;
                } else if (tab === 'schedule') {
                    const sched = u.generatedSchedule || [];
                    const schedHtml = sched.length > 0 ? sched.map(t => this._renderTaskRow(t)).join('') : '<p class="text-slate-400 text-sm text-center py-10">Nenhum cronograma gerado ainda. Aguarde a mentora.</p>';
                    
                    content = `
                    <div class="space-y-6 md:space-y-8 animate-fade-in pb-10">
                        <div class="glass-panel p-6 md:p-8 rounded-2xl md:rounded-3xl border-white/10 shadow-lg bg-slate-900/60 flex justify-between items-center">
                            <div><h1 class="text-2xl md:text-3xl font-extrabold text-white mb-1">Cronograma</h1><p class="text-slate-300 text-xs md:text-sm">Suas tarefas organizadas pela mentora.</p></div>
                            <button onclick="window.App.readjustSchedule(event)" class="bg-violet-600 hover:bg-violet-500 text-white px-4 py-2 rounded-xl text-xs md:text-sm font-bold flex items-center gap-2 shadow-lg"><i data-lucide="refresh-cw" class="w-4 h-4"></i> Reajustar Atrasos</button>
                        </div>
                        <div class="glass-panel p-4 md:p-6 rounded-2xl md:rounded-3xl border-white/10 shadow-lg bg-slate-900/60 space-y-3 max-h-[70vh] overflow-y-auto custom-scrollbar">
                            ${schedHtml}
                        </div>
                    </div>`;
                } else if (tab === 'flashcards') {
                    const today = new Date().toISOString();
                    const cards = u.flashcards || [];
                    const dueCards = cards.filter(c => c.nextReviewDate <= today);
                    const limit = u.dailyCardLimit || 10;
                    const cardsToday = dueCards.slice(0, limit);

                    let srsHtml = '';
                    if (cardsToday.length === 0) {
                        srsHtml = `
                        <div class="text-center py-12">
                            <div class="w-20 h-20 bg-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-4 border border-emerald-500/30"><i data-lucide="check-circle" class="w-10 h-10"></i></div>
                            <h3 class="text-white font-bold text-xl mb-2">Tudo Feito!</h3>
                            <p class="text-slate-400 text-sm">Você não tem cards para revisar hoje.</p>
                        </div>`;
                    } else {
                        const card = cardsToday[0];
                        srsHtml = `
                        <div class="perspective-1000 w-full max-w-lg mx-auto h-[350px]">
                            <div class="relative w-full h-full transform-style-3d ${this.state.isCardFlipped ? 'rotate-y-180' : ''}">
                                <!-- Front -->
                                <div class="absolute inset-0 backface-hidden bg-slate-800 border-2 border-violet-500/50 rounded-3xl p-8 flex flex-col items-center justify-center text-center shadow-[0_0_30px_rgba(139,92,246,0.2)] cursor-pointer" onclick="window.App.flipCard()">
                                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest absolute top-6">Frente - Pergunta</p>
                                    <p class="text-white text-lg md:text-xl font-medium whitespace-pre-wrap">${card.front}</p>
                                    <p class="text-violet-400 text-xs mt-8 animate-pulse">Toque para ver a resposta</p>
                                </div>
                                <!-- Back -->
                                <div class="absolute inset-0 backface-hidden rotate-y-180 bg-slate-800 border-2 border-emerald-500/50 rounded-3xl p-6 md:p-8 flex flex-col items-center justify-center text-center shadow-[0_0_30px_rgba(16,185,129,0.2)]">
                                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest absolute top-6">Verso - Resposta</p>
                                    <div class="flex-1 flex items-center justify-center overflow-y-auto w-full custom-scrollbar py-8"><p class="text-white text-base md:text-lg font-medium whitespace-pre-wrap">${card.back}</p></div>
                                    <div class="w-full grid grid-cols-3 gap-2 mt-4">
                                        <button onclick="window.App.srsAnswer('${card.id}', 0)" class="bg-rose-500/20 text-rose-400 border border-rose-500/50 hover:bg-rose-500 hover:text-white py-2 md:py-3 rounded-xl text-xs md:text-sm font-bold transition-colors">Errei</button>
                                        <button onclick="window.App.srsAnswer('${card.id}', 1)" class="bg-amber-500/20 text-amber-400 border border-amber-500/50 hover:bg-amber-500 hover:text-white py-2 md:py-3 rounded-xl text-xs md:text-sm font-bold transition-colors">Bom</button>
                                        <button onclick="window.App.srsAnswer('${card.id}', 2)" class="bg-emerald-500/20 text-emerald-400 border border-emerald-500/50 hover:bg-emerald-500 hover:text-white py-2 md:py-3 rounded-xl text-xs md:text-sm font-bold transition-colors">Fácil</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <p class="text-center text-slate-400 text-sm mt-6 font-bold">Restam: <span class="text-violet-400">${cardsToday.length}</span> cards hoje</p>`;
                    }

                    content = `
                    <div class="space-y-6 md:space-y-8 animate-fade-in pb-10">
                        <div class="glass-panel p-6 md:p-8 rounded-2xl md:rounded-3xl border-white/10 shadow-lg bg-slate-900/60 flex justify-between items-center">
                            <div><h1 class="text-2xl md:text-3xl font-extrabold text-white mb-1">Revisão Espaçada</h1><p class="text-slate-300 text-xs md:text-sm">Fixe o conteúdo usando SRS.</p></div>
                            <div class="text-right"><span class="block text-2xl font-black text-cyan-400">${cards.length}</span><span class="text-[10px] text-slate-400 uppercase font-bold">Total na Base</span></div>
                        </div>
                        
                        <div class="glass-panel p-6 md:p-8 rounded-2xl md:rounded-3xl border-white/10 shadow-lg bg-slate-900/60">
                            ${srsHtml}
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="glass-panel p-6 rounded-2xl border-white/10 shadow-lg bg-slate-900/60">
                                <h3 class="text-white font-bold text-lg mb-4 flex items-center gap-2"><i data-lucide="plus-circle" class="w-5 h-5 text-violet-400"></i> Criar Card Personalizado</h3>
                                <form onsubmit="window.App.saveCustomFlashcard(event)" class="space-y-3">
                                    <textarea id="fc-front" required placeholder="Frente (Pergunta)" class="w-full glass-input rounded-xl p-3 text-sm h-20 outline-none focus:border-violet-500 custom-scrollbar"></textarea>
                                    <textarea id="fc-back" required placeholder="Verso (Resposta)" class="w-full glass-input rounded-xl p-3 text-sm h-24 outline-none focus:border-emerald-500 custom-scrollbar"></textarea>
                                    <button type="submit" class="w-full bg-violet-600 hover:bg-violet-500 text-white font-bold py-3 rounded-xl text-sm transition-colors">Salvar Card</button>
                                </form>
                            </div>
                            <div class="glass-panel p-6 rounded-2xl border-white/10 shadow-lg bg-slate-900/60">
                                <h3 class="text-white font-bold text-lg mb-4 flex items-center gap-2"><i data-lucide="settings" class="w-5 h-5 text-slate-400"></i> Configuração Diária</h3>
                                <form onsubmit="window.App.updateCardLimit(event)" class="space-y-3">
                                    <div><label class="text-xs text-slate-400 font-bold uppercase mb-1 block">Meta de Cards por Dia</label><input type="number" id="fc-limit" value="${u.dailyCardLimit || 10}" min="1" max="100" class="w-full glass-input rounded-xl p-3 text-sm text-center font-bold" /></div>
                                    <button type="submit" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-xl text-sm transition-colors">Salvar Limite</button>
                                </form>
                            </div>
                        </div>
                    </div>`;
                } else if (tab === 'profile') {
                    let schedHtml = daysMap.map(d => `
                        <div class="flex flex-col items-center bg-black/40 p-2 rounded-lg md:rounded-xl border border-white/10 w-[28%] sm:w-[85px] md:w-[90px] shadow-inner flex-grow-0">
                            <span class="text-[9px] md:text-[10px] font-bold text-slate-300 mb-1 md:mb-2 uppercase">${d.label}</span>
                            <div class="flex items-center justify-between w-full px-1">
                                <button type="button" onclick="window.App.updateSchedVal('${d.key}', -1)" class="w-5 h-5 md:w-6 md:h-6 rounded-full bg-white/10 text-white font-black hover:bg-rose-500 flex items-center justify-center">-</button>
                                <span id="sch-${d.key}" class="font-black text-white text-xs md:text-sm">${this.state.schedule[d.key]||0}h</span>
                                <button type="button" onclick="window.App.updateSchedVal('${d.key}', 1)" class="w-5 h-5 md:w-6 md:h-6 rounded-full bg-white/10 text-white font-black hover:bg-emerald-500 flex items-center justify-center">+</button>
                            </div>
                        </div>
                    `).join('');

                    content = `
                    <div class="space-y-6 md:space-y-8 animate-fade-in pb-10">
                        <div class="glass-panel p-6 md:p-8 rounded-2xl md:rounded-3xl border-white/10 shadow-lg bg-slate-900/60"><h1 class="text-2xl md:text-3xl font-extrabold text-white mb-1">Meu Perfil</h1><p class="text-slate-300 text-xs md:text-sm">Gerencie suas configurações de estudo.</p></div>
                        
                        <div class="glass-panel p-6 md:p-8 rounded-2xl md:rounded-3xl border-white/10 shadow-lg bg-slate-900/60">
                            <h2 class="text-lg md:text-xl font-bold text-white mb-4"><i data-lucide="clock" class="inline w-5 h-5 text-violet-400 mr-2"></i> Ajustar Horas Disponíveis</h2>
                            <div class="p-4 bg-slate-950/50 rounded-2xl border border-white/5 mb-6">
                                <div class="flex flex-wrap justify-center gap-2">${schedHtml}</div>
                            </div>
                            <button id="btn-save-prof" onclick="window.App.saveStudentProfile()" class="w-full md:w-auto px-8 py-3.5 bg-violet-600 hover:bg-violet-500 text-white rounded-xl font-bold text-sm md:text-base flex items-center justify-center gap-2 mx-auto"><i data-lucide="save" class="w-5 h-5"></i> Salvar Alterações</button>
                        </div>
                    </div>`;
                }

                return `
                <div class="flex h-full w-full bg-transparent">
                    ${sidebar}
                    <main class="flex-1 flex flex-col h-[100dvh] relative">
                        <header class="glass-panel border-b border-white/5 p-3 flex items-center justify-between z-40 md:hidden">
                            <div class="flex items-center gap-3"><button onclick="window.App.toggleMenu()" class="text-slate-200"><i data-lucide="menu" class="w-5 h-5"></i></button><h2 class="text-base font-bold text-white">${navItems.find(i=>i.id===tab)?.label||'Painel'}</h2></div>
                            <button onclick="window.App.logout()" class="text-rose-400 bg-rose-500/10 p-1.5 rounded-md border border-rose-500/20"><i data-lucide="log-out" class="w-5 h-5"></i></button>
                        </header>
                        <div class="flex-1 overflow-y-auto p-4 md:p-8 z-10 custom-scrollbar"><div class="max-w-6xl mx-auto h-full">${content}</div></div>
                    </main>
                </div>`;
            },

            _renderTaskRow: function(t) {
                const isCompleted = t.completed;
                const isQuestions = t.type === 'questoes';
                const color = t.type === 'teoria' ? 'violet' : t.type === 'revisao' ? 'amber' : 'emerald';
                const bgClass = isCompleted ? 'bg-emerald-900/20 border-emerald-500/30' : 'bg-slate-800/80 border-slate-600';
                const iconColor = isCompleted ? 'text-emerald-400' : `text-${color}-400`;
                const opacity = isCompleted ? 'opacity-70' : 'opacity-100';

                const isActiveTimer = this.state.activeTimerId === t.id;
                const timerHtml = isActiveTimer ? `
                    <div class="flex items-center gap-2 bg-slate-900 px-3 py-1.5 rounded-lg border border-cyan-500/50">
                        <span class="text-cyan-400 font-mono font-bold text-sm tracking-wider" id="timer-display-${t.id}">${this.formatTimer(this.state.activeTimerSeconds)}</span>
                        <button onclick="window.App.pauseTimer()" class="text-rose-400 hover:text-rose-300 p-1"><i data-lucide="pause-circle" class="w-4 h-4"></i></button>
                    </div>
                ` : (!isCompleted ? `
                    <button onclick="window.App.startTimer('${t.id}', ${t.duration})" class="flex items-center gap-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded-lg text-xs font-bold border border-white/10 transition-colors"><i data-lucide="play-circle" class="w-4 h-4"></i> Play Timer</button>
                ` : '');

                let questionsInputHtml = '';
                if (isQuestions && this.state.activeTaskInputId === t.id && !isCompleted) {
                    questionsInputHtml = `
                    <div class="mt-3 bg-black/40 p-3 rounded-xl border border-white/10 animate-fade-in flex flex-col md:flex-row gap-2 items-center">
                        <input type="number" id="q-tot-${t.id}" placeholder="Total Resolvidas" class="glass-input text-xs p-2 rounded w-full md:w-32 text-center" />
                        <input type="number" id="q-cor-${t.id}" placeholder="Acertos" class="glass-input text-xs p-2 rounded w-full md:w-32 text-center" />
                        <div class="flex gap-2 w-full md:w-auto mt-2 md:mt-0">
                            <button onclick="window.App.saveQuestionsTask('${t.id}')" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold px-3 py-2 rounded flex-1 md:flex-none">Salvar</button>
                            <button onclick="window.App.cancelQuestionsTask()" class="bg-rose-600 hover:bg-rose-500 text-white text-xs font-bold px-3 py-2 rounded flex-1 md:flex-none">Cancelar</button>
                        </div>
                    </div>`;
                }

                return `
                <div class="p-4 md:p-5 rounded-xl border ${bgClass} ${opacity} transition-all relative group shadow-md hover:shadow-lg hover:border-${color}-500/50 mb-3">
                    <div class="flex flex-col md:flex-row gap-4 items-start md:items-center justify-between">
                        <div class="flex items-start gap-3 w-full md:w-auto">
                            <button onclick="window.App.toggleStudentTask('${t.id}')" class="mt-1 w-6 h-6 rounded-full border-2 ${isCompleted ? 'bg-emerald-500 border-emerald-500' : 'border-slate-500 hover:border-violet-400'} flex items-center justify-center flex-shrink-0 transition-colors">
                                ${isCompleted ? '<i data-lucide="check" class="text-white w-4 h-4"></i>' : ''}
                            </button>
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[10px] md:text-xs font-bold uppercase tracking-wider text-${color}-400 bg-${color}-500/10 px-2 py-0.5 rounded border border-${color}-500/20">${this.formatDateBR(t.date)}</span>
                                    <span class="text-[10px] md:text-xs text-slate-400 font-bold">${t.duration} min</span>
                                    ${isQuestions && isCompleted ? `<span class="text-[10px] md:text-xs font-bold text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded border border-emerald-500/20">${t.qCorrect}/${t.qTotal} Acertos</span>` : ''}
                                </div>
                                <p class="text-white text-sm md:text-base font-bold leading-snug ${isCompleted ? 'line-through text-slate-400' : ''}">${t.topic}</p>
                            </div>
                        </div>
                        <div class="flex items-center justify-end w-full md:w-auto gap-3">
                            ${timerHtml}
                        </div>
                    </div>
                    ${questionsInputHtml}
                </div>`;
            }
        };

        window.onload = () => { window.App.init(); };

    </script>
</body>
</html>
