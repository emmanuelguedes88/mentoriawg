<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mentoria Wanessa Guedes</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; overflow: hidden; background-color: #020617; color: #e2e8f0; }
        
        .glass-panel { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-panel-hover:hover { background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(139, 92, 246, 0.5); box-shadow: 0 0 20px rgba(139, 92, 246, 0.3); }
        .glass-input { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.15); color: white; transition: all 0.3s ease; }
        .glass-input:focus { outline: none; border-color: rgba(139, 92, 246, 0.7); box-shadow: 0 0 15px rgba(139, 92, 246, 0.4); background: rgba(0, 0, 0, 0.6); }
        .neon-text { text-shadow: 0 0 15px rgba(167, 139, 250, 0.6), 0 0 30px rgba(167, 139, 250, 0.4); }
        
        .transform-style-3d { transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.4); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(167, 139, 250, 0.8); }
        
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }

        .radio-card:checked + div {
            border-color: rgba(139, 92, 246, 0.8);
            background-color: rgba(139, 92, 246, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.3);
        }
    </style>
</head>
<body>

    <div id="bg-carousel" class="absolute inset-0 z-[-1] overflow-hidden bg-slate-950"></div>
    <div class="absolute inset-0 bg-slate-950/85 z-0 mix-blend-multiply pointer-events-none"></div>
    <div class="absolute top-0 left-[-10%] w-[300px] h-[300px] md:w-[500px] md:h-[500px] bg-violet-600/20 rounded-full blur-[100px] md:blur-[150px] pointer-events-none fixed z-0"></div>
    <div class="absolute bottom-0 right-[-10%] w-[300px] h-[300px] md:w-[500px] md:h-[500px] bg-cyan-600/20 rounded-full blur-[100px] md:blur-[150px] pointer-events-none fixed z-0"></div>

    <div id="app-root" class="relative z-10 h-screen w-full overflow-hidden"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, updateDoc, addDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDBuOiA3jNQqNYhASP9ncCqjP6ngzJ61TY",
            authDomain: "mentoriawg.firebaseapp.com",
            projectId: "mentoriawg",
            storageBucket: "mentoriawg.firebasestorage.app",
            messagingSenderId: "112550898338",
            appId: "1:112550898338:web:4ca6ce3e74280b56f045fb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // IMAGENS OFICIAIS
        const teacherImage = "https://firebasestorage.googleapis.com/v0/b/mentoriawg.firebasestorage.app/o/IMG-20220428-WA0066.jpg?alt=media&token=6fd11f19-d0c9-4f06-adb6-ec31d3f1854e";
        const studentImage = "https://images.unsplash.com/photo-1531427186611-ecfd6d936c79?auto=format&fit=crop&w=150&q=80";
        const fallbackImage = "https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=1200&q=80";
        
        const bgImages = [
            "https://images.unsplash.com/photo-1434030216411-0b793f4b4173?auto=format&fit=crop&w=1920&q=80", 
            "https://images.unsplash.com/photo-1532012197267-da84d127e765?auto=format&fit=crop&w=1920&q=80", 
            "https://images.unsplash.com/photo-1517842645767-c639042777db?auto=format&fit=crop&w=1920&q=80"
        ];
        const daysMap = [
            { key: 'dom', label: 'Dom', index: 0 }, { key: 'seg', label: 'Seg', index: 1 }, 
            { key: 'ter', label: 'Ter', index: 2 }, { key: 'qua', label: 'Qua', index: 3 },
            { key: 'qui', label: 'Qui', index: 4 }, { key: 'sex', label: 'Sex', index: 5 }, { key: 'sab', label: 'Sáb', index: 6 }
        ];

        const LOADER_SVG = `<svg class="animate-spin w-5 h-5 mx-auto text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;

        window.App = {
            state: {
                user: null,
                userData: null,
                loading: true,
                authView: 'select',
                authError: '',
                platformLogo: teacherImage,
                
                activeTab: 'dashboard',
                isMenuOpen: false,
                
                students: [],
                classes: [],
                selectedStudentId: null,
                
                schedule: { seg: 4, ter: 4, qua: 4, qui: 4, sex: 4, sab: 6, dom: 0 },
                regAvatarUrl: null,
                
                editingClassId: null,
                confirmDeleteClassId: null,

                lastTypedEmail: '',
                lastTypedPw: '',

                activeTaskInputId: null, 
                
                // Editor de Cronograma
                editalForms: [{ id: Date.now(), name: '', content: '' }],
                parsedBlocks: null,
                scheduleMode: 'flex',
                scheduleStartDate: new Date().toISOString().split('T')[0],
                scheduleEndDate: (() => { let d = new Date(); d.setDate(d.getDate()+30); return d.toISOString().split('T')[0]; })(),
                
                confirmDeleteId: null,
                isCardFlipped: false,
                
                activeTimerId: null,
                activeTimerSeconds: 0,
                timerIntervalObj: null
            },
            unsubs: [],

            init: function() {
                this.initCarousel();
                
                try {
                    const logoRef = doc(db, 'settings', 'platform');
                    const logoUnsub = onSnapshot(logoRef, (snap) => {
                        if (snap.exists() && snap.data().platformLogo) {
                            this.state.platformLogo = snap.data().platformLogo;
                            localStorage.setItem('customPlatformLogo', snap.data().platformLogo);
                            this.render();
                        }
                    }, (err) => {});
                    this.unsubs.push(logoUnsub);
                } catch(e) {}
                
                onAuthStateChanged(auth, (user) => {
                    this.state.user = user;
                    this.clearUnsubs();
                    
                    if (user) {
                        const docRef = doc(db, 'users', user.uid);
                        const unsub = onSnapshot(docRef, (docSnap) => {
                            if (docSnap.exists()) {
                                this.state.userData = { id: docSnap.id, ...docSnap.data() };
                                
                                if(!this.state.userData.flashcards) this.state.userData.flashcards = [];
                                if(!this.state.userData.dailyCardLimit) this.state.userData.dailyCardLimit = 10;
                                
                                this.loadData();
                            } else {
                                this.state.userData = null;
                            }
                            this.state.loading = false;
                            this.render();
                        }, (err) => { 
                            console.error(err); 
                            this.state.loading = false; 
                            this.render(); 
                        });
                        this.unsubs.push(unsub);
                    } else {
                        this.state.userData = null;
                        this.state.loading = false;
                        this.render();
                    }
                });
            },

            clearUnsubs: function() {
                this.unsubs.forEach(u => u());
                this.unsubs = [];
                if(this.state.timerIntervalObj) clearInterval(this.state.timerIntervalObj);
            },

            loadData: function() {
                if (this.state.userData && this.state.userData.role === 'mentor') {
                    const qStudents = query(collection(db, 'users'), where("role", "==", "student"));
                    const u1 = onSnapshot(qStudents, (snap) => {
                        this.state.students = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        this.render();
                    });
                    this.unsubs.push(u1);
                }
                const u2 = onSnapshot(collection(db, 'classes'), (snap) => {
                    let cls = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    cls.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                    this.state.classes = cls;
                    this.render();
                });
                this.unsubs.push(u2);
            },

            initCarousel: function() {
                const container = document.getElementById('bg-carousel');
                bgImages.forEach((src, i) => {
                    const img = document.createElement('img');
                    img.src = src;
                    img.className = `absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 ease-in-out ${i === 0 ? 'opacity-100' : 'opacity-0'}`;
                    img.id = `bg-img-${i}`;
                    container.appendChild(img);
                });
                let idx = 0;
                setInterval(() => {
                    document.getElementById(`bg-img-${idx}`).classList.remove('opacity-100');
                    document.getElementById(`bg-img-${idx}`).classList.add('opacity-0');
                    idx = (idx + 1) % bgImages.length;
                    document.getElementById(`bg-img-${idx}`).classList.remove('opacity-0');
                    document.getElementById(`bg-img-${idx}`).classList.add('opacity-100');
                }, 8000);
            },

            notify: function(msg, isError = false) {
                const toast = document.createElement('div');
                toast.className = `fixed bottom-4 right-4 ${isError ? 'bg-rose-600' : 'bg-emerald-600'} border border-white/20 text-white px-4 py-3 rounded-xl shadow-2xl z-[9999] flex items-center gap-2 font-bold text-sm transition-opacity duration-500 opacity-0`;
                toast.innerHTML = `<i data-lucide="${isError ? 'alert-triangle' : 'check-circle'}" class="w-4 h-4"></i> ${msg}`;
                document.body.appendChild(toast);
                if(window.lucide) lucide.createIcons();
                setTimeout(() => { toast.style.opacity = '1'; }, 10);
                setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 3500);
            },

            formatDateBR: (ds) => {
                if(!ds) return '';
                if(ds.includes('-')) { const [y,m,d] = ds.split('-'); return `${d}/${m}/${y}`; }
                return new Date(ds).toLocaleDateString('pt-BR');
            },
            formatDateTimeBR: (ds) => {
                if(!ds) return '';
                const d = new Date(ds);
                return d.toLocaleDateString('pt-BR') + ' às ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
            },
            formatTimer: function(totalSeconds) {
                const h = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
                const m = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
                const s = (totalSeconds % 60).toString().padStart(2, '0');
                return `${h}:${m}:${s}`;
            },
            compressImg: (file) => new Promise((resolve) => {
                const r = new FileReader(); r.readAsDataURL(file);
                r.onload = (e) => {
                    const i = new Image(); i.src = e.target.result;
                    i.onload = () => {
                        const c = document.createElement('canvas');
                        let w = i.width, h = i.height;
                        if(w>h) { if(w>300){h*=300/w; w=300;} } else { if(h>300){w*=300/h; h=300;} }
                        c.width = w; c.height = h;
                        c.getContext('2d').drawImage(i,0,0,w,h);
                        resolve(c.toDataURL('image/jpeg', 0.8));
                    };
                };
            }),
            
            getSafePw: function(key) {
                try { 
                    const val = localStorage.getItem(key);
                    if(!val) return '';
                    return decodeURIComponent(atob(val)); 
                } catch(e) { 
                    try { return atob(localStorage.getItem(key)); } catch(err) { return ''; }
                }
            },
            setSafePw: function(key, pw) {
                try { localStorage.setItem(key, btoa(encodeURIComponent(pw))); } catch(e) {}
            },

            setView: function(v) { 
                this.state.authView = v; 
                this.state.authError = ''; 
                this.state.lastTypedEmail = ''; 
                this.state.lastTypedPw = ''; 
                this.render(); 
            },
            setTab: function(t) { this.state.activeTab = t; this.state.isMenuOpen = false; this.render(); },
            toggleMenu: function() { this.state.isMenuOpen = !this.state.isMenuOpen; this.render(); },
            logout: function() { 
                this.state.lastTypedEmail = ''; 
                this.state.lastTypedPw = ''; 
                signOut(auth); 
            },
            
            togglePassword: function(id) {
                const el = document.getElementById(id);
                const btn = document.getElementById(`btn-${id}`);
                if(el.type === 'password') { el.type = 'text'; btn.innerHTML = '<i data-lucide="eye-off" class="w-4 h-4 md:w-5 md:h-5"></i>'; } 
                else { el.type = 'password'; btn.innerHTML = '<i data-lucide="eye" class="w-4 h-4 md:w-5 md:h-5"></i>'; }
                lucide.createIcons();
            },

            uploadLogo: async function(input) {
                if(input.files[0]) {
                    const b64 = await this.compressImg(input.files[0]);
                    this.state.platformLogo = b64;
                    localStorage.setItem('customPlatformLogo', b64);
                    try {
                        await setDoc(doc(db, 'settings', 'platform'), { platformLogo: b64 }, { merge: true });
                    } catch(e) {}
                    this.render();
                }
            },

            startTimer: function(taskId, totalMins) {
                if (this.state.activeTimerId === taskId && this.state.timerIntervalObj) return; 
                if (this.state.activeTimerId !== taskId) {
                    this.state.activeTimerId = taskId;
                    this.state.activeTimerSeconds = totalMins * 60;
                }
                if(this.state.timerIntervalObj) clearInterval(this.state.timerIntervalObj);
                this.state.timerIntervalObj = setInterval(() => {
                    if (this.state.activeTimerSeconds > 0) {
                        this.state.activeTimerSeconds--;
                        const el = document.getElementById(`timer-display-${taskId}`);
                        if(el) el.innerText = this.formatTimer(this.state.activeTimerSeconds);
                    } else {
                        this.pauseTimer();
                    }
                }, 1000);
                this.render();
            },
            pauseTimer: function() {
                if(this.state.timerIntervalObj) {
                    clearInterval(this.state.timerIntervalObj);
                    this.state.timerIntervalObj = null;
                }
                this.render();
            },

            // -------------------------------------------------------------------------
            // LOGIN E AUTENTICAÇÃO (ORIGINAL)
            // -------------------------------------------------------------------------
            loginStudent: async function(e) {
                e.preventDefault();
                const em = document.getElementById('log-em').value.trim();
                const pw = document.getElementById('log-pw').value;
                const rem = document.getElementById('log-rem').checked;
                
                this.state.lastTypedEmail = em;
                this.state.lastTypedPw = pw;
                
                const btn = document.getElementById('btn-log-submit');
                const origTxt = btn ? btn.innerHTML : '';
                if(btn) { btn.innerHTML = LOADER_SVG; btn.disabled = true; }
                this.state.authError = '';
                
                try {
                    const cred = await signInWithEmailAndPassword(auth, em, pw);
                    try {
                        const docRef = doc(db, 'users', cred.user.uid);
                        const d = await getDoc(docRef);
                        if(!d.exists()) {
                            await setDoc(docRef, {
                                name: "Aluno(a)", email: em, age: 18, targetExam: "Definir", 
                                schedule: { seg: 4, ter: 4, qua: 4, qui: 4, sex: 4, sab: 6, dom: 0 },
                                role: 'student', status: 'pending', retention: 0, streak: 0, hours: 0, tasksDone: 0,
                                avatarUrl: null, mentorMessages: [], performance: {}, generatedSchedule: [], flashcards: [], dailyCardLimit: 10, rawEdital: '', createdAt: new Date().toISOString()
                            });
                        }
                    } catch(ex){}

                    if(rem) { localStorage.setItem('wg_s_em', em); this.setSafePw('wg_s_pw', pw); }
                    else { localStorage.removeItem('wg_s_em'); localStorage.removeItem('wg_s_pw'); }
                } catch(err) { 
                    console.error(err);
                    this.state.authError = 'E-mail ou senha incorretos.'; 
                    if(btn) { btn.innerHTML = origTxt; btn.disabled = false; }
                    this.render(); 
                }
            },

            registerStudent: async function(e) {
                e.preventDefault();
                const em = document.getElementById('reg-em').value.trim();
                const pw = document.getElementById('reg-pw').value;
                const nm = document.getElementById('reg-nm').value;
                const ex = document.getElementById('reg-ex').value;
                const ag = document.getElementById('reg-ag').value;

                const btn = document.getElementById('btn-reg-submit');
                const origTxt = btn ? btn.innerHTML : '';
                if(btn) { btn.innerHTML = LOADER_SVG; btn.disabled = true; }
                this.state.authError = '';

                try {
                    const cred = await createUserWithEmailAndPassword(auth, em, pw);
                    await setDoc(doc(db, 'users', cred.user.uid), {
                        name: nm, email: em, age: Number(ag), targetExam: ex, schedule: this.state.schedule,
                        role: 'student', status: 'pending', retention: 0, streak: 0, hours: 0, tasksDone: 0,
                        avatarUrl: this.state.regAvatarUrl, mentorMessages: [], performance: {}, generatedSchedule: [], flashcards: [], dailyCardLimit: 10, rawEdital: '', createdAt: new Date().toISOString()
                    });
                } catch(err) {
                    console.error(err);
                    if(err.code==='auth/email-already-in-use') this.state.authError='Este e-mail já está cadastrado. Tente entrar.';
                    else if(err.code==='auth/weak-password') this.state.authError='A senha deve ter no mínimo 6 caracteres.';
                    else this.state.authError = 'Erro ao criar conta: ' + err.message;
                    if(btn) { btn.innerHTML = origTxt; btn.disabled = false; }
                    this.render();
                }
            },

            loginMentor: async function(e) {
                e.preventDefault();
                const em = document.getElementById('men-em').value.trim();
                const pw = document.getElementById('men-pw').value;
                const rem = document.getElementById('men-rem').checked;
                
                this.state.lastTypedEmail = em;
                this.state.lastTypedPw = pw;

                const btn = document.getElementById('btn-men-submit');
                const origTxt = btn ? btn.innerHTML : '';
                if(btn) { btn.innerHTML = LOADER_SVG; btn.disabled = true; }
                this.state.authError = '';

                try {
                    await signInWithEmailAndPassword(auth, em, pw);
                    try {
                        const docRef = doc(db, 'users', auth.currentUser.uid);
                        const d = await getDoc(docRef);
                        if(!d.exists()) {
                            await setDoc(docRef, { name: 'Wanessa Guedes', email: em, role: 'mentor', avatarUrl: teacherImage });
                        }
                    } catch(ex){}

                    if(rem) { localStorage.setItem('wg_m_em', em); this.setSafePw('wg_m_pw', pw); }
                    else { localStorage.removeItem('wg_m_em'); localStorage.removeItem('wg_m_pw'); }
                } catch(err) {
                    if (err.code === 'auth/invalid-credential' || err.code === 'auth/user-not-found' || err.code === 'auth/invalid-login-credentials') {
                        try {
                            const cred = await createUserWithEmailAndPassword(auth, em, pw);
                            await setDoc(doc(db, 'users', cred.user.uid), { name: 'Wanessa Guedes', email: em, role: 'mentor', avatarUrl: teacherImage });
                            if(rem) { localStorage.setItem('wg_m_em', em); this.setSafePw('wg_m_pw', pw); }
                            else { localStorage.removeItem('wg_m_em'); localStorage.removeItem('wg_m_pw'); }
                        } catch(cErr) {
                            if(cErr.code==='auth/email-already-in-use') this.state.authError='Senha incorreta.';
                            else this.state.authError = "Erro no banco. Verifique as Regras do Firestore.";
                            if(btn) { btn.innerHTML = origTxt; btn.disabled = false; }
                            this.render();
                        }
                    } else { 
                        console.error(err);
                        this.state.authError = 'Senha incorreta ou erro de rede.'; 
                        if(btn) { btn.innerHTML = origTxt; btn.disabled = false; }
                        this.render();
                    }
                }
            },

            // -------------------------------------------------------------------------
            // ROTINAS DA APLICAÇÃO
            // -------------------------------------------------------------------------
            updateSchedVal: function(day, delta) {
                let cur = this.state.schedule[day] || 0;
                this.state.schedule[day] = Math.max(0, Math.min(24, cur + delta));
                const el = document.getElementById(`sch-${day}`);
                if(el) el.innerText = `${this.state.schedule[day]}h`;
            },

            uploadAvatar: async function(input, type) {
                if(input.files[0]) {
                    const b64 = await this.compressImg(input.files[0]);
                    if(type === 'reg') { 
                        this.state.regAvatarUrl = b64; 
                        const imgDisplay = document.getElementById('reg-av-display');
                        if (imgDisplay) imgDisplay.innerHTML = `<img src="${b64}" class="w-full h-full object-cover"/>`;
                    }
                    if(type === 'mentor' || type === 'student') {
                        await updateDoc(doc(db, 'users', this.state.userData.id), { avatarUrl: b64 });
                    }
                }
            },

            approveStudent: async function(id) { await updateDoc(doc(db, 'users', id), { status: 'active' }); },
            
            selectStudent: function(id) { 
                this.state.selectedStudentId = id; 
                this.state.parsedBlocks = null;
                this.state.editalForms = [{ id: Date.now(), name: '', content: '' }];
                this.state.confirmDeleteId = null;
                this.render(); 
            },
            
            saveClass: async function(e) {
                e.preventDefault();
                const btn = document.getElementById('btn-save-class');
                const oTxt = btn.innerHTML;
                btn.innerHTML = LOADER_SVG; btn.disabled = true; 
                
                const title = document.getElementById('cls-title').value;
                const subject = document.getElementById('cls-subj').value;
                const date = document.getElementById('cls-date').value;
                const studentId = document.getElementById('cls-studentId') ? document.getElementById('cls-studentId').value : null;

                try {
                    if(this.state.editingClassId) {
                        await updateDoc(doc(db, 'classes', this.state.editingClassId), { title, subject, date, studentId });
                        this.state.editingClassId = null;
                    } else {
                        await addDoc(collection(db, 'classes'), { title, subject, date, studentId, createdAt: new Date().toISOString() });
                    }
                    this.render(); 
                } catch(err) { 
                    this.notify('Erro ao salvar aula.', true);
                    btn.innerHTML = oTxt; btn.disabled = false; lucide.createIcons();
                }
            },
            editClass: function(id) {
                const cls = this.state.classes.find(c=>c.id===id);
                this.state.editingClassId = id;
                this.state.confirmDeleteClassId = null;
                this.render();
                setTimeout(() => {
                    document.getElementById('cls-title').value = cls.title;

            parseDisciplineContent: function(subjectName, text, applySubtopicLimit) {
                const words = text.split(/\s+/);
                const blocks = [];
                let currentBlock = [];
                let currentMainTopicStr = "";
                let subtopicCount = 0;

                const isMainTopic = (w) => /^(\d+)[.)\-]?$/.test(w);
                const isSubtopic = (w) => /^(\d+\.\d+(\.\d+)*)[.)\-]?$/.test(w);

                for (let w of words) {
                    if (!w) continue;

                    if (isMainTopic(w)) {
                        if (currentBlock.length > 0) {
                            blocks.push({ id: 'b_'+Date.now()+'_'+Math.random().toString(36).substr(2), discipline: subjectName, content: currentBlock.join(' ') });
                        }
                        currentMainTopicStr = w;
                        subtopicCount = 0;
                        currentBlock = [w];
                    } else if (isSubtopic(w) && applySubtopicLimit) {
                        if (subtopicCount >= 3) {
                            blocks.push({ id: 'b_'+Date.now()+'_'+Math.random().toString(36).substr(2), discipline: subjectName, content: currentBlock.join(' ') });
                            currentBlock = [`${currentMainTopicStr} (Cont.)`, w];
                            subtopicCount = 1;
                        } else {
                            subtopicCount++;
                            currentBlock.push(w);
                        }
                    } else {
                        currentBlock.push(w);
                    }
                }
                if (currentBlock.length > 0) {
                    blocks.push({ id: 'b_'+Date.now()+'_'+Math.random().toString(36).substr(2), discipline: subjectName, content: currentBlock.join(' ') });
                }
                return blocks;
            },

            processEditalForms: function() {

                const isIntensive = this.state.scheduleMode === 'intensive';

                this.state.editalForms.forEach(form => {
                    if (!form.name.trim() || !form.content.trim()) return;
                    const subject = form.name.trim().toUpperCase();
                    const parsed = this.parseDisciplineContent(subject, form.content, !isIntensive);
                    allBlocks = allBlocks.concat(parsed);
                });

                if (allBlocks.length === 0) return this.notify("Preencha pelo menos uma disciplina.", true);

                this.state.parsedBlocks = allBlocks;
                this.render();
            },

            _generateFlexible: function(rawBlocks, scheduleConfig, baseDate) {
                let draft = [];
                let fcards = [];
                let scheduledTasks = []; 
                
                let unstudied = {};
                rawBlocks.forEach(b => {
                    if (!unstudied[b.discipline]) unstudied[b.discipline] = [];
                    unstudied[b.discipline].push(b);
                });
                
                let subjectNames = Object.keys(unstudied);
                let currentSubjectIdx = 0;

                function getNextUnstudiedTopic() {
                    let attempts = 0;
                    while (attempts < subjectNames.length) {
                        const subj = subjectNames[currentSubjectIdx];
                        currentSubjectIdx = (currentSubjectIdx + 1) % subjectNames.length;
                        if (unstudied[subj] && unstudied[subj].length > 0) return unstudied[subj].shift();
                        attempts++;
                    }
                    return null;
                }

                let currentDayCount = 1;
                const daysKeys = ['dom','seg','ter','qua','qui','sex','sab'];
                let tIdCounter = 0;

                const advanceToValidDay = (d) => {
                    let dCopy = new Date(d);
                    let count = 0;
                    while((scheduleConfig[daysKeys[dCopy.getDay()]] || 0) === 0 && count < 14) { dCopy.setDate(dCopy.getDate() + 1); count++; }
                    return dCopy;
                };

                let currDate = advanceToValidDay(baseDate);

                while ((Object.values(unstudied).some(arr => arr.length > 0) || scheduledTasks.some(t => !t.done)) && currentDayCount <= 730) {
                    let dayKey = daysKeys[currDate.getDay()];
                    let totalHoursAvailable = Math.floor(scheduleConfig[dayKey] || 0); 
                    
                    if (totalHoursAvailable > 0) {
                        for (let h = 0; h < totalHoursAvailable; h++) {
                            let pending = scheduledTasks.filter(t => t.dayDue <= currentDayCount && !t.done);
                            pending.sort((a, b) => a.priority - b.priority || a.dayDue - b.dayDue);

                            let offset = currDate.getTimezoneOffset() * 60000;
                            let dateStr = (new Date(currDate.getTime() - offset)).toISOString().split('T')[0];

                            if (pending.length > 0 && pending[0].priority <= 1) { 
                                let task = pending[0];
                                task.done = true;
                                draft.push({
                                    id: 'tsk_' + Date.now() + '_' + (tIdCounter++),
                                    topic: `${task.topic.discipline}: ${task.topic.content}`,
                                    subject: task.topic.discipline, type: 'questoes', duration: 60, date: dateStr, completed: false, qTotal: 0, qCorrect: 0
                                });
                            } else {
                                let newTopic = getNextUnstudiedTopic();
                                if (newTopic) {
                                    let tId = Date.now() + '_' + (tIdCounter++);
                                    draft.push({
                                        id: 'tsk_' + tId,
                                        topic: `${newTopic.discipline}: ${newTopic.content}`,
                                        subject: newTopic.discipline, type: 'teoria', duration: 60, date: dateStr, completed: false
                                    });
                                    
                                    scheduledTasks.push({ dayDue: currentDayCount + 1, topic: newTopic, priority: 1, done: false }); 
                                    scheduledTasks.push({ dayDue: currentDayCount + 7, topic: newTopic, priority: 3, done: false, isRev: true });
                                    scheduledTasks.push({ dayDue: currentDayCount + 15, topic: newTopic, priority: 3, done: false, isRev: true });
                                    scheduledTasks.push({ dayDue: currentDayCount + 30, topic: newTopic, priority: 3, done: false, isRev: true });

                                    fcards.push({
                                        id: 'fc_'+tId, 
                                        front: `📚 [${newTopic.discipline}]\n\nComo examinador de banca de concurso, exijo que você domine este tema:\n"${newTopic.content.substring(0, 80)}..."\n\nQual é a regra geral fundamental deste tópico e quais são as suas principais exceções?`, 
                                        back: `💡 Gabarito do Especialista:\n\nPara gabaritar este tópico, você não pode esquecer a regra matriz e os casos de exceção. As bancas adoram usar palavras restritivas (como 'salvo', 'exceto', 'somente') nas exceções deste exato assunto. Revise os prazos, as competências e as palavras-chave que diferenciam a regra da exceção!`,
                                        nextReviewDate: dateStr, interval: 1, easeFactor: 2.5
                                    });
                                } else if (pending.length > 0) { 
                                    let task = pending[0];
                                    task.done = true;
                                    draft.push({
                                        id: 'tsk_' + Date.now() + '_' + (tIdCounter++),
                                        topic: `${task.topic.discipline}: ${task.topic.content}`,
                                        subject: task.topic.discipline, type: 'revisao', duration: 60, date: dateStr, completed: false
                                    });
                                } else {
                                    break; 
                                }
                            }
                        }
                    }
                    currDate.setDate(currDate.getDate() + 1);
                    currDate = advanceToValidDay(currDate);
                    currentDayCount++;
                }
                return { draft, fcards };
            },

            _generateIntensive: function(rawBlocks, scheduleConfig, startDate, endDate) {
                let availableSlots = [];
                let currentDate = new Date(startDate);
                const daysKeys = ['dom','seg','ter','qua','qui','sex','sab'];

                while (currentDate <= endDate) {
                    const dayOfWeek = currentDate.getDay();
                    const hours = scheduleConfig[daysKeys[dayOfWeek]] || 0;
                    if (hours > 0) {
                        let offset = currentDate.getTimezoneOffset() * 60000;
                        let dateStr = (new Date(currentDate.getTime() - offset)).toISOString().split('T')[0];
                        for (let h = 0; h < hours; h++) availableSlots.push(dateStr);
                    }
                    currentDate.setDate(currentDate.getDate() + 1);
                }

                const H = availableSlots.length;
                if (H === 0) { this.notify("Você não tem horas nesse período!", true); return null; }

                let finalTasks = [];
                if (rawBlocks.length > H) {
                    const chunkSize = Math.ceil(rawBlocks.length / H);
                    for (let i = 0; i < H; i++) {
                        let mergedContent = [];
                        let subjectStr = "";
                        for (let j = 0; j < chunkSize; j++) {
                            if (rawBlocks.length > 0) {
                                let b = rawBlocks.shift();
                                subjectStr = b.discipline; 
                                mergedContent.push(b.content);
                            }
                        }
                        if (mergedContent.length > 0) {
                            finalTasks.push({ subject: subjectStr, content: mergedContent.join(' | '), type: 'teoria' });
                        }
                    }
                } else {
                    let blockPhases = rawBlocks.map(b => ({ ...b, phase: 0 }));
                    for (let i = 0; i < H; i++) {
                        let block = blockPhases[i % blockPhases.length];
                        let t = block.phase === 0 ? 'teoria' : block.phase === 1 ? 'questoes' : 'revisao';
                        finalTasks.push({ subject: block.discipline, content: block.content, type: t });
                        block.phase++;
                    }
                }

                let draft = [];
                for (let i = 0; i < H; i++) {
                    let task = finalTasks[i];
                    if(!task) break;
                    let taskObj = {
                        id: 'tsk_int_' + Date.now() + '_' + i,
                        topic: `${task.subject}: ${task.content}`,
                        subject: task.subject, type: task.type, duration: 60, date: availableSlots[i], completed: false
                    };
                    if (task.type === 'questoes') { taskObj.qTotal = 0; taskObj.qCorrect = 0; }
                    draft.push(taskObj);
                }
                return { draft, fcards: [] };
            },

            readjustSchedule: async function(e) {
                if(e) e.preventDefault();
                const u = this.state.userData;
                let sched = [...(u.generatedSchedule || [])];
                let completed = sched.filter(t => t.completed);
                let incomplete = sched.filter(t => !t.completed);
                
                incomplete.sort((a,b) => new Date(a.date) - new Date(b.date));
                
                let currDate = new Date();
                currDate.setHours(0,0,0,0);
                const keys = ['dom','seg','ter','qua','qui','sex','sab'];
                
                let scheduleConfig = u.schedule || { seg: 4, ter: 4, qua: 4, qui: 4, sex: 4, sab: 6, dom: 0 };
                let totalSlots = 0;
                Object.values(scheduleConfig).forEach(v => totalSlots += Number(v));
                if(totalSlots === 0) return this.notify("Vá em Perfil e configure suas horas disponíveis.", true);
                
                const advanceToValidDay = (d) => {
                    let dCopy = new Date(d);
                    let count = 0;
                    while((scheduleConfig[keys[dCopy.getDay()]] || 0) === 0 && count < 14) {
                        dCopy.setDate(dCopy.getDate() + 1); count++;
                    }
                    return dCopy;
                };

                currDate = advanceToValidDay(currDate);
                
                let incIdx = 0;
                let safety = 0;
                while(incIdx < incomplete.length && safety < 1000) {
                    safety++;
                    let dayKey = keys[currDate.getDay()];
                    let slots = Math.floor(scheduleConfig[dayKey] || 0);
                    
                    for(let i=0; i<slots && incIdx < incomplete.length; i++) {
                        const offset = currDate.getTimezoneOffset() * 60000;
                        incomplete[incIdx].date = (new Date(currDate.getTime() - offset)).toISOString().split('T')[0];
                        incIdx++;
                    }
                    currDate.setDate(currDate.getDate() + 1);
                    currDate = advanceToValidDay(currDate);
                }
                
                try {
                    await updateDoc(doc(db, 'users', u.id), { generatedSchedule: [...completed, ...incomplete] });
                    this.notify("Cronograma reajustado com sucesso!");
                } catch(e) { this.notify("Erro ao reajustar cronograma.", true); }
                this.render();
            },

                if(task.completed && this.state.activeTimerId === taskId) {

                if(!task.completed && task.type === 'questoes') {

                if(!card) return;

                if(quality === 0) {
                    card.interval = 1;
                    card.easeFactor = Math.max(1.3, card.easeFactor - 0.2);
                } else if (quality === 1) {
                    card.interval = Math.max(1, Math.round(card.interval * 1.2));

                    card.interval = Math.max(1, Math.round(card.interval * card.easeFactor));
                    card.easeFactor += 0.15;
                }

                let nextDate = new Date();
                nextDate.setDate(nextDate.getDate() + card.interval);
                card.nextReviewDate = nextDate.toISOString();

                this.state.isCardFlipped = false;

                                    <button type="button" onclick="window.App.confirmDeleteClass('${c.id}')" class="flex-1 md:flex-none p-2.5 md:p-3 bg-rose-600 text-white rounded-lg md:rounded-xl hover:bg-rose-50 flex items-center justify-center font-bold text-xs md:text-sm shadow-[0_0_15px_rgba(225,29,72,0.6)]">Confirmar?</button>
                                    <button type="button" onclick="window.App.cancelDeleteClass()" class="p-2.5 md:p-3 bg-slate-800 text-slate-300 rounded-lg md:rounded-xl hover:bg-slate-700 flex items-center justify-center"><i data-lucide="x" class="w-4 h-4 md:w-5 md:h-5"></i></button>
                                ` : `
                                    <button type="button" onclick="window.App.deleteClass('${c.id}')" class="flex-1 md:flex-none p-2.5 md:p-3 bg-rose-500/10 text-rose-400 rounded-lg md:rounded-xl hover:bg-rose-500/20 flex items-center justify-center border border-rose-500/20"><i data-lucide="trash-2" class="w-4 h-4 md:w-5 md:h-5"></i></button>
                                `}
                            </div>
                        </div>
                    `}).join('') || '<p class="text-slate-400 text-sm">Nenhuma aula registrada.</p>';

                    content = `
                    <div class="space-y-6 md:space-y-8 animate-fade-in pb-10">
                        <div class="glass-panel p-6 md:p-8 rounded-2xl md:rounded-[3rem] border-white/10 shadow-lg bg-slate-900/60 flex gap-3 md:gap-4 items-center"><div class="p-3 md:p-4 bg-violet-500/20 rounded-xl md:rounded-2xl text-violet-400 border border-violet-500/30"><i data-lucide="calendar-plus" class="w-6 h-6 md:w-9 md:h-9"></i></div><div><h1 class="text-2xl md:text-3xl font-extrabold text-white mb-1">Aulas</h1><p class="text-slate-300 text-xs md:text-sm">Gerencie os encontros da mentoria.</p></div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8">
                            <div class="glass-panel p-6 md:p-8 rounded-2xl md:rounded-[3rem] border border-violet-500/30 bg-slate-900/80 h-fit">
                                <h2 class="text-lg md:text-xl font-bold text-white mb-4 md:mb-6 flex justify-between items-center">${eid?'Editar Aula':'Nova Aula'} ${eid?`<button type="button" onclick="window.App.state.editingClassId=null; document.getElementById('cls-form').reset(); window.App.render()" class="text-[10px] md:text-xs text-rose-400 bg-rose-500/10 px-2 py-1 rounded border border-rose-500/20 hover:bg-rose-500/20">Cancelar</button>`:''}</h2>
                                <form id="cls-form" onsubmit="window.App.saveClass(event)" class="space-y-3 md:space-y-4">
                                    <div><label class="text-[10px] md:text-xs text-slate-400 font-bold uppercase block mb-1">Título</label><input id="cls-title" required type="text" class="w-full glass-input rounded-lg md:rounded-xl py-2 md:py-3 px-3 md:px-4 text-sm" /></div>
                                    <div><label class="text-[10px] md:text-xs text-slate-400 font-bold uppercase block mb-1">Disciplina</label><input id="cls-subj" required type="text" class="w-full glass-input rounded-lg md:rounded-xl py-2 md:py-3 px-3 md:px-4 text-sm" /></div>
                                    <div><label class="text-[10px] md:text-xs text-slate-400 font-bold uppercase block mb-1">Data</label><input id="cls-date" required type="date" class="w-full glass-input rounded-lg md:rounded-xl py-2 md:py-3 px-3 md:px-4 text-sm" /></div>
                                    <div>
                                        <label class="text-[10px] md:text-xs text-slate-400 font-bold uppercase block mb-1">Aluno Específico</label>
                                        <select id="cls-studentId" required class="w-full glass-input rounded-lg md:rounded-xl py-2 md:py-3 px-3 md:px-4 text-sm text-slate-400">
                                            <option value="">Selecione o aluno...</option>
                                            ${actStudents.map(s => `<option value="${s.id}" ${eid && this.state.classes.find(c=>c.id===eid)?.studentId === s.id ? 'selected' : ''}>${s.name}</option>`).join('')}
                                        </select>
                                    </div>
                                    <button id="btn-save-class" type="submit" class="w-full py-3 md:py-3.5 mt-2 md:mt-4 rounded-lg md:rounded-xl text-white font-bold text-sm md:text-base flex justify-center ${eid?'bg-amber-600':'bg-gradient-to-r from-violet-600 to-fuchsia-600'}">${eid?'Atualizar Aula':'Registrar Aula'}</button>
                                </form>
                            </div>
                            <div class="lg:col-span-2 glass-panel p-6 md:p-8 rounded-2xl md:rounded-[3rem] border-white/10 bg-slate-900/60"><h2 class="text-lg md:text-xl font-bold text-white mb-4 md:mb-6 flex items-center gap-2"><i data-lucide="book-open" class="text-emerald-400 w-5 h-5"></i> Histórico</h2><div class="space-y-3 md:space-y-4">${clsHtml}</div></div>
                        </div>
                    </div>`;
                }

                return `
                <div class="flex h-full w-full bg-transparent">
                    ${sidebar}
                    <main class="flex-1 flex flex-col h-[100dvh] relative">
                        <header class="glass-panel border-b border-white/5 p-3 flex items-center justify-between z-40 md:hidden">
                            <div class="flex items-center gap-3"><button onclick="window.App.toggleMenu()" class="text-slate-200"><i data-lucide="menu" class="w-5 h-5"></i></button><h2 class="text-base font-bold text-white">${navItems.find(i=>i.id===tab)?.label||'Painel'}</h2></div>
                            <button onclick="window.App.logout()" class="text-rose-400 bg-rose-500/10 p-1.5 rounded-md border border-rose-500/20"><i data-lucide="log-out" class="w-5 h-5"></i></button>
                        </header>
                        <div class="flex-1 overflow-y-auto p-4 md:p-8 z-10 custom-scrollbar"><div class="max-w-6xl mx-auto h-full">${content}</div></div>
                    </main>
                </div>`;
            },

            getStudentHtml: function() {
                const u = this.state.userData;
                const tab = this.state.activeTab;
                const safeName = (u.name || 'Aluno').split(' ')[0];

                const navItems = [
                    { id: 'dashboard', label: 'Meu Painel', icon: 'layout-dashboard' },
                    { id: 'schedule', label: 'Cronograma', icon: 'calendar' },
                    { id: 'flashcards', label: 'Revisão Espaçada', icon: 'layers' },
                    { id: 'profile', label: 'Meu Perfil', icon: 'user' }
                ];

                const sidebar = `
                <aside class="fixed inset-y-0 left-0 z-50 w-64 md:w-72 glass-panel border-r border-white/10 shadow-2xl transform transition-transform duration-300 md:relative md:translate-x-0 flex flex-col ${this.state.isMenuOpen ? 'translate-x-0' : '-translate-x-full'}">
                    <div class="p-6 md:p-8 border-b border-white/5 text-center bg-slate-900/40 relative">
                        <button class="md:hidden absolute top-4 right-4 text-slate-300 hover:text-white" onclick="window.App.toggleMenu()"><i data-lucide="x" class="w-5 h-5"></i></button>
                        <div class="w-20 h-20 md:w-24 md:h-24 mx-auto rounded-full overflow-hidden border-2 md:border-4 border-violet-500 shadow-[0_0_30px_rgba(139,92,246,0.5)] mb-3 md:mb-4 mt-6 md:mt-4 relative group cursor-pointer" onclick="document.getElementById('stu-avatar-upload').click()">
                            <input type="file" id="stu-avatar-upload" onchange="window.App.uploadAvatar(this, 'student')" accept="image/*" class="hidden" />
                            ${u.avatarUrl ? `<img src="${u.avatarUrl}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />` : `<img src="${studentImage}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />`}
                            <div class="absolute inset-0 bg-black/50 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100"><i data-lucide="upload-cloud" class="text-white mb-1 w-5 h-5"></i><span class="text-[9px] text-white font-bold uppercase">Foto</span></div>
                        </div>
                        <h2 class="font-extrabold text-white text-lg md:text-xl">${safeName}</h2>
                        <p class="text-violet-300 text-[9px] md:text-[10px] font-black uppercase tracking-widest mt-1 bg-violet-900/40 py-1 rounded-full border border-violet-500/30 inline-block px-3">Portal do Aluno</p>
                    </div>
                    <nav class="p-3 md:p-4 space-y-2 md:space-y-3 flex-1">
                        ${navItems.map(item => `
                            <button onclick="window.App.setTab('${item.id}')" class="w-full flex items-center gap-3 px-4 py-3 md:px-5 md:py-4 rounded-xl md:rounded-2xl font-bold relative text-sm md:text-base ${tab===item.id?'bg-violet-500/30 text-white border border-violet-400/50 shadow-[inset_0_0_20px_rgba(139,92,246,0.2)]':'text-slate-300 hover:bg-white/10'}">
                                <i data-lucide="${item.icon}" class="w-5 h-5 ${tab===item.id?'text-violet-300':''}"></i> ${item.label}
                            </button>
                        `).join('')}
                    </nav>
                    <div class="p-4 border-t border-white/5 bg-slate-900/40 hidden md:block"><button onclick="window.App.logout()" class="w-full flex items-center justify-center gap-2 px-4 py-3 text-sm font-bold text-rose-300 hover:text-white hover:bg-rose-500/20 rounded-xl transition-colors"><i data-lucide="log-out" class="w-4 h-4"></i> Sair da Conta</button></div>
                </aside>`;

                let content = '';

                if (tab === 'dashboard') {
                    const today = new Date();
                    const offset = today.getTimezoneOffset() * 60000;
                    const todayStr = (new Date(today.getTime() - offset)).toISOString().split('T')[0];

                    const scheduleToday = (u.generatedSchedule || []).filter(t => t.date === todayStr);
                    
                    let scheduleHtml = '';
                    if(u.scheduleStatus === 'pending' && u.generatedSchedule && u.generatedSchedule.length > 0) {
                        scheduleHtml = `<div class="bg-amber-500/20 p-4 rounded-xl border border-amber-500/30 text-amber-300 text-sm font-bold text-center"><i data-lucide="clock" class="inline w-5 h-5 mb-1"></i><br/>Seu cronograma está em análise pela mentora. Aguarde a aprovação para iniciar as missões!</div>`;
                    } else if (!u.generatedSchedule || u.generatedSchedule.length === 0) {
                        scheduleHtml = '<p class="text-slate-400 text-sm">Nenhum cronograma ativo. Acesse a aba Cronograma para gerar o seu!</p>';
                    } else {
                        scheduleHtml = scheduleToday.length > 0 ? scheduleToday.map(t => this._renderTaskRow(t)).join('') : '<p class="text-slate-400 text-sm">Nenhuma tarefa programada para hoje. Aproveite o descanso!</p>';
                    }

                    const myClasses = this.state.classes.filter(c => c.studentId === u.id);
                    const myClassesHtml = myClasses.map(c => `
                        <div class="bg-black/40 p-3 rounded-xl border border-cyan-500/20 mb-2 hover:border-cyan-500/50 transition-colors">
                            <span class="text-[10px] font-bold text-cyan-400 bg-cyan-500/10 px-2 py-0.5 rounded border border-cyan-500/30 uppercase flex w-fit items-center gap-1 mb-1"><i data-lucide="calendar" class="w-3 h-3"></i> ${this.formatDateBR(c.date)}</span>
                            <p class="text-white text-sm md:text-base font-bold">${c.title}</p>
                            <p class="text-xs text-slate-400 mt-0.5">${c.subject}</p>
                        </div>
                    `).join('') || '<p class="text-slate-400 text-xs md:text-sm">Nenhuma aula agendada para você ainda.</p>';

                    let totalHours = 0; let totalTasks = 0; let globalAcertos = 0; let globalTotal = 0;
                    if(u.generatedSchedule) {
                        u.generatedSchedule.forEach(t => {
                            if(t.completed) { totalHours += ((t.duration || 60)/60); totalTasks++; }
                        });
                    }
                    if(u.performance) {
                        Object.values(u.performance).forEach(p => { globalAcertos += p.correct; globalTotal += p.total; });
                    }
                    const globalPct = globalTotal > 0 ? Math.round((globalAcertos/globalTotal)*100) : 0;

                    const chatMsgs = (u.mentorMessages || []).map(msg => `
                        <div class="flex ${msg.role==='student'?'justify-end':'justify-start'}">
                            <div class="flex flex-col gap-1 max-w-[90%] md:max-w-[70%]">
                                <div class="p-3 md:p-4 rounded-2xl md:rounded-3xl shadow-[0_5px_15px_rgba(0,0,0,0.3)] backdrop-blur-xl ${msg.role==='student'?'bg-gradient-to-br from-violet-600 to-fuchsia-600 text-white rounded-br-sm':'bg-slate-800/90 border border-white/10 text-slate-100 rounded-bl-sm'}">
                                    <p class="whitespace-pre-wrap font-medium text-sm md:text-base">${msg.text}</p>
                                </div>
                                <span class="text-[9px] md:text-[10px] text-slate-500 font-bold ${msg.role==='student'?'text-right mr-2':'text-left ml-2'}">${this.formatDateTimeBR(msg.date)}</span>
                            </div>
                        </div>
                    `).join('') || '<p class="text-center text-slate-500 mt-10 text-sm">Nenhuma mensagem. Mande um "Olá" para sua mentora!</p>';

                    const studentChatHtml = `
                    <div class="glass-panel rounded-[2rem] md:rounded-3xl border-white/10 bg-slate-900/80 shadow-xl mt-6 md:mt-8 flex flex-col h-[400px] md:h-[450px] overflow-hidden relative">
                        <div class="absolute top-0 left-0 w-1.5 md:w-2 h-full bg-gradient-to-b from-violet-400 to-fuchsia-600"></div>
                        <div class="p-4 md:p-6 border-b border-white/10 bg-black/20 z-10 flex items-center gap-3">
                            <i data-lucide="message-square" class="text-violet-400 w-5 h-5 md:w-6 md:h-6"></i>
                            <h3 class="text-lg md:text-xl font-bold text-white">Chat com a Mentora</h3>
                        </div>
                        <div class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 md:space-y-6 z-10 custom-scrollbar">
                            ${chatMsgs}
                            <div id="chat-end"></div>
                        </div>
                        <div class="p-3 md:p-5 bg-slate-950/80 border-t border-white/10 z-10">
                            <form onsubmit="window.App.sendMsg(event, 'student', '${u.id}')" class="flex gap-2 md:gap-3 relative bg-slate-900/80 rounded-2xl p-1.5 md:p-2 border border-white/20">
                                <input type="text" id="chat-inp" placeholder="Envie sua dúvida ou atualização..." class="flex-1 bg-transparent px-3 py-2 text-white outline-none font-medium text-sm md:text-base" />
                                <button type="submit" class="w-10 h-10 md:w-12 md:h-12 rounded-lg md:rounded-xl bg-violet-600 hover:bg-violet-500 flex items-center justify-center text-white transition-colors"><i data-lucide="send" class="w-4 h-4 md:w-5 md:h-5"></i></button>
                            </form>
                        </div>
                    </div>`;

                    content = `
                    <div class="space-y-6 md:space-y-8 animate-fade-in pb-10">
                        <div class="glass-panel p-6 md:p-8 rounded-2xl md:rounded-[3rem] border-white/10 shadow-lg bg-slate-900/60 flex flex-col md:flex-row gap-4 justify-between items-start md:items-center">
                            <div>
                                <h1 class="text-2xl md:text-4xl font-extrabold text-white mb-1 md:mb-2">Olá, ${safeName}! 🚀</h1>
                                <p class="text-slate-300 text-sm md:text-base">Seu foco atual: <strong class="text-cyan-400">${u.targetExam}</strong></p>
                            </div>
                            <div class="flex gap-4">
                                <div class="text-center bg-black/40 p-3 rounded-xl border border-white/5"><span class="block text-2xl mb-1">🔥</span><span class="text-white font-black text-xl">${u.streak || 0}</span><p class="text-[10px] text-slate-400 font-bold uppercase">Dias</p></div>
                                <div class="text-center bg-black/40 p-3 rounded-xl border border-white/5"><span class="block text-2xl mb-1">🧠</span><span class="text-white font-black text-xl">${globalPct}%</span><p class="text-[10px] text-slate-400 font-bold uppercase">Acertos</p></div>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8">
                            <div class="lg:col-span-2 glass-panel p-6 md:p-8 rounded-2xl md:rounded-[3rem] border-white/10 shadow-lg bg-slate-900/60">
                                <div class="flex justify-between items-center mb-6">
                                    <h2 class="text-lg md:text-xl font-bold text-white flex items-center gap-2"><i data-lucide="target" class="text-violet-400 w-5 h-5"></i> Missões de Hoje</h2>
                                    <button onclick="window.App.setTab('schedule')" class="text-violet-400 hover:text-white text-xs md:text-sm font-bold">Ver Tudo</button>
                                </div>
                                <div class="space-y-3">${scheduleHtml}</div>
                            </div>
                            
                            <div class="glass-panel p-6 md:p-8 rounded-2xl md:rounded-[3rem] border-white/10 shadow-lg bg-slate-900/60 h-fit">
                                <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2"><i data-lucide="video" class="text-cyan-400 w-5 h-5"></i> Registros de Aulas</h2>
                                <div class="space-y-3 max-h-[300px] overflow-y-auto custom-scrollbar pr-2">
                                    ${myClassesHtml}
                                </div>
                            </div>
                        </div>

                        ${studentChatHtml}
                    </div>`;
                } else if (tab === 'schedule') {
                    let draftHtml = '';
                    let activeScheduleHtml = '';

                    if (u.generatedSchedule && u.generatedSchedule.length > 0) {
                        
                        let deleteBtnHtml = '';
                        if (this.state.confirmDeleteId === u.id) {
                            deleteBtnHtml = `
                            <div class="flex items-center gap-2 animate-fade-in bg-rose-950/80 p-1.5 md:p-2 rounded-xl border border-rose-500/50">
                                <span class="text-white text-[10px] md:text-xs font-bold px-2 hidden sm:inline">Excluir tudo?</span>
                                <button onclick="window.App.deleteStudentSchedule('${u.id}')" class="bg-rose-600 hover:bg-rose-500 text-white px-3 md:px-4 py-2 rounded-lg text-xs font-bold transition-colors shadow-[0_0_10px_rgba(225,29,72,0.4)] flex items-center gap-1.5"><i data-lucide="check" class="w-3 h-3 md:w-4 md:h-4"></i> Sim</button>
                                <button onclick="window.App.state.confirmDeleteId = null; window.App.render();" class="bg-slate-700 hover:bg-slate-600 text-white px-3 py-2 rounded-lg text-xs font-bold transition-colors"><i data-lucide="x" class="w-3 h-3 md:w-4 md:h-4"></i></button>
                            </div>`;
                        } else {
                            deleteBtnHtml = `
                            <div class="flex gap-2 w-full md:w-auto">
                                <button onclick="window.App.editStudentSchedule('${u.id}')" class="flex-1 md:flex-none bg-blue-600 hover:bg-blue-500 text-white px-4 py-2.5 rounded-xl text-xs md:text-sm font-bold transition-colors flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(37,99,235,0.4)]">
                                    <i data-lucide="edit" class="w-4 h-4"></i> Editar
                                </button>
                                <button onclick="window.App.state.confirmDeleteId = '${u.id}'; window.App.render();" class="flex-1 md:flex-none bg-rose-600 hover:bg-rose-500 text-white px-4 py-2.5 rounded-xl text-xs md:text-sm font-bold transition-colors flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(225,29,72,0.4)]">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i> Excluir
                                </button>
                            </div>`;
                        }

                        let pendingWarning = u.scheduleStatus === 'pending' ? `
                        <div class="bg-amber-500/20 border border-amber-500/50 p-4 rounded-xl mb-4 flex justify-between items-center">
                            <div><h4 class="text-amber-400 font-bold text-sm md:text-base"><i data-lucide="clock" class="w-5 h-5 inline mb-1"></i> Cronograma Pendente</h4><p class="text-xs text-amber-200">Sua mentora precisa aprovar este cronograma para liberar suas missões.</p></div>
                        </div>
                        ` : '';

                        activeScheduleHtml = `
                        ${pendingWarning}
                        <div class="bg-emerald-900/20 border border-emerald-500/30 p-4 md:p-5 rounded-xl md:rounded-2xl flex flex-col md:flex-row justify-between items-center gap-4 mb-4">
                            <div class="flex items-center gap-3"><i data-lucide="check-circle-2" class="text-emerald-400"></i><span class="text-emerald-300 font-bold text-sm md:text-base">Cronograma ${u.scheduleStatus === 'pending' ? 'em Análise' : 'Ativo'}</span></div>
                            ${deleteBtnHtml}
                        </div>
                        <div class="space-y-3 max-h-[400px] overflow-y-auto custom-scrollbar pr-2 mt-4 bg-black/20 p-2 rounded-xl border border-white/5">
                            ${u.generatedSchedule.map(t => {
                                const color = t.type==='teoria' ? 'violet' : t.type==='revisao' ? 'amber' : 'emerald';
                                const cleanTopic = String(t.topic || '').replace(/\(1h de.*?\)/gi, '').trim();
                                return `
                                <div class="bg-black/40 p-3 rounded-xl border border-white/5 flex gap-3">
                                    <div class="bg-${color}-500/20 p-2 rounded-lg h-fit border border-${color}-500/30"><i data-lucide="book-open" class="text-${color}-400 w-4 h-4"></i></div>
                                    <div>
                                        <span class="text-[10px] text-${color}-400 font-bold uppercase tracking-wider">${this.formatDateBR(t.date)}</span>
                                        <p class="text-white text-xs md:text-sm font-medium mt-1 leading-relaxed">${cleanTopic}</p>
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                        <div class="mt-6 flex justify-end">
                            <button onclick="window.App.readjustSchedule(event)" class="bg-violet-600 hover:bg-violet-500 text-white px-4 py-2 rounded-xl text-xs md:text-sm font-bold flex items-center gap-2 shadow-lg"><i data-lucide="refresh-cw" class="w-4 h-4"></i> Reajustar Atrasos</button>
                        </div>
                        `;

                        draftHtml = activeScheduleHtml;

                    } else {
                        if (this.state.parsedBlocks) {
                            draftHtml = `
                            <div class="bg-slate-900/80 border border-violet-500/30 p-4 md:p-6 rounded-xl md:rounded-2xl animate-fade-in shadow-[0_0_30px_rgba(139,92,246,0.1)]">
                                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 border-b border-white/10 pb-4">
                                    <div>
                                        <h4 class="text-white font-bold text-lg">Revisão Final dos Blocos</h4>
                                        <p class="text-slate-400 text-xs mt-1">Aqui estão os tópicos divididos. Você pode editá-los antes de enviar para aprovação da mentora.</p>
                                    </div>
                                    <button onclick="window.App.addNewBlock()" class="bg-violet-600 hover:bg-violet-500 px-4 py-2.5 rounded-xl text-xs md:text-sm font-bold text-white transition-colors shadow-lg flex items-center gap-2"><i data-lucide="plus-circle" class="w-4 h-4"></i> Inserir Bloco Adicional</button>
                                </div>

                                <div class="space-y-4 max-h-[400px] overflow-y-auto custom-scrollbar pr-2" id="blocks-editor-list">
                                    ${this.state.parsedBlocks.map((b, i) => `

                        <div class="flex items-start gap-3 w-full md:w-auto">
                            <button ${isPendingApproval ? 'disabled' : `onclick="window.App.toggleStudentTask('${t.id}')"`} class="mt-1.5 w-6 h-6 rounded-full border-2 ${isCompleted ? 'bg-emerald-500 border-emerald-500' : 'border-slate-500 hover:border-violet-400'} flex items-center justify-center flex-shrink-0 transition-colors ${isPendingApproval ? 'opacity-50 cursor-not-allowed' : ''}">
                                ${isCompleted ? '<i data-lucide="check" class="text-white w-4 h-4"></i>' : ''}
                            </button>
                            <div class="flex-1">
                                <div class="flex flex-wrap items-center gap-2 mb-1.5">
                                    <span class="text-[10px] md:text-xs font-bold uppercase tracking-wider text-${color}-400 bg-${color}-500/10 px-2 py-0.5 rounded border border-${color}-500/20">${this.formatDateBR(t.date)}</span>
                                    <span class="text-[10px] md:text-xs font-black text-${color}-200 bg-${color}-600/30 px-2 py-0.5 rounded-md border border-${color}-500/40 flex items-center gap-1"><i data-lucide="${iconTask}" class="w-3 h-3"></i> ${ludicLabel}</span>
                                    <span class="text-[10px] md:text-xs text-slate-300 font-bold bg-slate-800 px-2 py-0.5 rounded border border-slate-700 flex items-center gap-1"><i data-lucide="hourglass" class="w-3 h-3"></i> ${t.duration || 60} min</span>
                                    ${isQuestions && isCompleted ? `<span class="text-[10px] md:text-xs font-bold text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded border border-emerald-500/20">${t.qCorrect}/${t.qTotal} Acertos</span>` : ''}
                                </div>
                                <p class="text-white text-sm md:text-base font-bold leading-snug ${isCompleted ? 'line-through text-slate-500' : ''}">${cleanTopic}</p>
                                ${!isCompleted ? `<p class="text-[10px] md:text-xs text-slate-400 font-medium mt-1 flex items-center gap-1"><i data-lucide="info" class="w-3 h-3"></i> ${ludicDesc}</p>` : ''}
                            </div>
                        </div>
                        <div class="flex items-center justify-end w-full md:w-auto gap-3 mt-2 md:mt-0">
                            ${timerHtml}
                        </div>
                    </div>
                    ${questionsInputHtml}
                </div>`;
            }
        };

        window.onload = () => { window.App.init(); };

    </script>
</body>
</html>
